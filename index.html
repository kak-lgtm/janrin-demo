<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#1C1C1E;--bg2:#2E2E30;--white:#F2EDE4;--gold:#B8965A;--teal:#5B8A8F;
--red:#8B1A1A;--border:#3D3D40;--highlight:#E8E0CE;--tile-base:#F0EBDB;
--tile-back:#E8E3D0;--tile-text:#1C1010;--table:#0F0F10;
--gold-glow:rgba(184,150,90,0.6);--gold-soft:rgba(184,150,90,0.25);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans JP',sans-serif;color:var(--white);user-select:none;touch-action:manipulation}
#app{width:100%;height:100%;position:relative;display:flex;flex-direction:column}

/* ===== TITLE SCREEN ===== */
#title-screen{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);z-index:100;
  background-image:radial-gradient(ellipse at 50% 40%, rgba(184,150,90,0.08) 0%, transparent 60%);
  overflow:hidden;
}
#title-screen::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.008) 2px,rgba(255,255,255,0.008) 4px);
  pointer-events:none;
}
#title-screen h1{
  font-family:'Noto Serif JP',serif;font-size:56px;color:var(--white);
  letter-spacing:16px;margin-bottom:4px;
  text-shadow:0 0 40px rgba(184,150,90,0.3),0 2px 4px rgba(0,0,0,0.5);
  animation:titleFadeIn 1.2s ease-out;
}
#title-screen .sub{
  font-size:13px;color:var(--gold);letter-spacing:6px;margin-bottom:24px;
  font-weight:300;opacity:0.85;
  animation:titleFadeIn 1.2s ease-out 0.3s both;
}
#title-screen .title-line{
  width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin-bottom:24px;animation:titleFadeIn 1.2s ease-out 0.2s both;
}
#title-screen .title-stats{
  font-size:11px;color:var(--highlight);opacity:0.5;margin-bottom:24px;
  animation:titleFadeIn 1.2s ease-out 0.4s both;text-align:center;line-height:1.8;
}
#title-screen button{
  background:linear-gradient(135deg,#C4A265,#B8965A,#A68548);
  color:var(--bg);border:none;padding:16px 56px;font-size:15px;
  font-family:'Noto Sans JP',sans-serif;font-weight:600;border-radius:4px;
  cursor:pointer;letter-spacing:3px;position:relative;
  box-shadow:0 4px 24px rgba(184,150,90,0.35),inset 0 1px 0 rgba(255,255,255,0.2);
  transition:transform 0.2s,box-shadow 0.2s;
  animation:titleFadeIn 1.2s ease-out 0.5s both;
}
#title-screen button:hover{transform:translateY(-2px);box-shadow:0 6px 32px rgba(184,150,90,0.5),inset 0 1px 0 rgba(255,255,255,0.2)}
#title-screen button:active{transform:translateY(0);box-shadow:0 2px 12px rgba(184,150,90,0.3)}

.title-bottom-btns{
  display:flex;gap:12px;margin-top:16px;
  animation:titleFadeIn 1.2s ease-out 0.6s both;
}
.title-bottom-btns button{
  background:transparent;border:1px solid rgba(184,150,90,0.3);color:var(--gold);
  padding:8px 20px;font-size:12px;font-family:'Noto Sans JP',sans-serif;
  border-radius:4px;cursor:pointer;letter-spacing:1px;
  transition:background 0.2s,border-color 0.2s;
}
.title-bottom-btns button:hover{background:rgba(184,150,90,0.1);border-color:rgba(184,150,90,0.5)}

@keyframes titleFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ===== RESULT SCREEN ===== */
#result-screen{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(15,15,16,0.96);z-index:90;
  background-image:radial-gradient(ellipse at 50% 30%, rgba(184,150,90,0.06) 0%, transparent 70%);
  animation:resultFadeIn 0.6s ease-out;
}
@keyframes resultFadeIn{from{opacity:0}to{opacity:1}}
#result-screen h2{
  font-family:'Noto Serif JP',serif;font-size:36px;color:var(--gold);
  margin-bottom:8px;letter-spacing:6px;
  text-shadow:0 0 30px rgba(184,150,90,0.4);
}
#result-screen .result-line{
  width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin-bottom:28px;
}
#result-screen .scores{margin-bottom:24px;min-width:340px}
#result-screen .score-row{
  display:flex;align-items:center;gap:16px;padding:12px 16px;
  border-bottom:1px solid rgba(61,61,64,0.6);position:relative;
  transition:background 0.2s;
}
#result-screen .score-row:first-child{
  background:linear-gradient(90deg,rgba(184,150,90,0.08),transparent);
  border-radius:4px 4px 0 0;
}
#result-screen .score-row .rank{
  font-family:'Noto Serif JP',serif;font-size:28px;color:var(--gold);
  width:44px;text-align:center;
}
#result-screen .score-row:first-child .rank{
  text-shadow:0 0 12px rgba(184,150,90,0.5);
}
#result-screen .score-row .name{flex:1;font-weight:600;font-size:15px;letter-spacing:1px}
#result-screen .score-row .pts{
  font-family:'Noto Serif JP',serif;font-size:22px;color:var(--gold);
  min-width:90px;text-align:right;
}
.result-share-area{display:flex;gap:10px;margin-bottom:20px}
.result-share-area button{
  background:transparent;border:1px solid rgba(184,150,90,0.3);color:var(--gold);
  padding:8px 16px;font-size:12px;font-family:'Noto Sans JP',sans-serif;
  border-radius:4px;cursor:pointer;letter-spacing:1px;transition:background 0.2s;
}
.result-share-area button:hover{background:rgba(184,150,90,0.1)}
#result-screen .result-main-btn{
  background:linear-gradient(135deg,#C4A265,#B8965A,#A68548);
  color:var(--bg);border:none;padding:14px 48px;font-size:15px;
  font-family:'Noto Sans JP',sans-serif;font-weight:600;border-radius:4px;
  cursor:pointer;letter-spacing:2px;
  box-shadow:0 4px 20px rgba(184,150,90,0.3),inset 0 1px 0 rgba(255,255,255,0.15);
  transition:transform 0.2s,box-shadow 0.2s;
}
#result-screen .result-main-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(184,150,90,0.45)}

/* ===== AGARI OVERLAY ===== */
#agari-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,10,12,0.95);z-index:80;opacity:0;
  transition:opacity 0.5s ease-out;pointer-events:none;
  background-image:radial-gradient(ellipse at 50% 40%, rgba(184,150,90,0.1) 0%, transparent 60%);
}
#agari-overlay.show{opacity:1;pointer-events:auto}

#agari-overlay.tier-normal .agari-type{
  font-family:'Noto Serif JP',serif;font-size:52px;color:var(--gold);
  margin-bottom:20px;letter-spacing:8px;
  text-shadow:0 0 40px rgba(184,150,90,0.7),0 0 80px rgba(184,150,90,0.3);
  animation:agariTextBrush 1.5s ease-out;
}
#agari-overlay.tier-mangan .agari-type{
  font-family:'Noto Serif JP',serif;font-size:58px;color:var(--white);
  margin-bottom:20px;letter-spacing:10px;
  text-shadow:0 0 50px rgba(200,140,40,0.8),0 0 100px rgba(200,140,40,0.4);
  animation:agariTextMangan 2s ease-out;
}
#agari-overlay.tier-yakuman .agari-type{
  font-family:'Noto Serif JP',serif;font-size:64px;color:var(--white);
  margin-bottom:20px;letter-spacing:12px;
  text-shadow:0 0 60px rgba(150,180,220,0.9),0 0 120px rgba(184,150,90,0.5);
  animation:agariTextYakuman 3s ease-out;
}
#agari-overlay .agari-type{
  font-family:'Noto Serif JP',serif;font-size:52px;color:var(--white);
  margin-bottom:20px;letter-spacing:8px;
  text-shadow:0 0 40px rgba(184,150,90,0.5),0 0 80px rgba(184,150,90,0.2);
  animation:agariTextBrush 1.5s ease-out;
}

@keyframes agariTextBrush{
  0%{opacity:0;transform:scale(0.5);filter:blur(12px)}
  30%{opacity:0.5;filter:blur(4px)}
  60%{opacity:1;transform:scale(1.05);filter:blur(0)}
  100%{transform:scale(1)}
}
@keyframes agariTextMangan{
  0%{opacity:0;transform:scale(0.3) translateY(20px);filter:blur(16px)}
  20%{opacity:0.3;filter:blur(8px)}
  50%{opacity:1;transform:scale(1.1) translateY(0);filter:blur(0)}
  70%{transform:scale(1.02)}
  100%{transform:scale(1)}
}
@keyframes agariTextYakuman{
  0%{opacity:0;transform:scale(0.2);filter:blur(20px);color:rgba(150,180,220,0.9)}
  25%{opacity:0.6;filter:blur(6px);color:rgba(150,180,220,1)}
  50%{opacity:1;transform:scale(1.15);filter:blur(0);color:var(--white)}
  70%{transform:scale(1.03)}
  100%{transform:scale(1)}
}

#agari-particles{
  position:absolute;inset:0;pointer-events:none;z-index:81;
}

#agari-overlay.tier-mangan::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(90deg, transparent 0%, rgba(200,140,40,0.15) 30%, rgba(200,140,40,0.25) 50%, rgba(200,140,40,0.15) 70%, transparent 100%);
  animation:orangeSweep 1.5s ease-out forwards;pointer-events:none;
}
@keyframes orangeSweep{
  0%{opacity:0;transform:scaleX(0);transform-origin:left}
  40%{opacity:1;transform:scaleX(1)}
  100%{opacity:0}
}

#agari-overlay.tier-yakuman::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%, rgba(150,180,220,0.15) 0%, transparent 60%);
  animation:yakumanGlow 3s ease-in-out forwards;pointer-events:none;
}
@keyframes yakumanGlow{
  0%{opacity:0}
  30%{opacity:1}
  100%{opacity:0.3}
}

#agari-overlay.tier-normal .agari-hand .disc-tile,
#agari-overlay.tier-normal .agari-hand .hand-tile{
  box-shadow:0 0 8px rgba(184,150,90,0.5);
}

#agari-overlay .agari-hand{display:flex;gap:3px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
#agari-overlay .yaku-list{
  margin-bottom:20px;background:rgba(46,46,48,0.85);
  border:1px solid rgba(184,150,90,0.5);border-radius:6px;
  padding:16px 24px;min-width:300px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
}
#agari-overlay .yaku-row{display:flex;justify-content:space-between;padding:5px 0;font-size:15px}
#agari-overlay .yaku-row .yn{color:var(--white);letter-spacing:1px}
#agari-overlay .yaku-row .yh{color:var(--gold);font-family:'Noto Serif JP',serif}
#agari-overlay .yaku-total{
  border-top:1px solid rgba(184,150,90,0.4);padding-top:10px;margin-top:6px;
  display:flex;justify-content:space-between;font-size:18px;
}
#agari-overlay .yaku-total .yn{color:var(--white);font-weight:600;letter-spacing:1px}
#agari-overlay .yaku-total .yh{color:var(--gold);font-family:'Noto Serif JP',serif;font-size:26px;text-shadow:0 0 12px rgba(184,150,90,0.4)}
#agari-overlay .agari-btn{
  background:linear-gradient(135deg,#C4A265,#B8965A,#A68548);
  color:var(--bg);border:none;padding:12px 40px;font-size:14px;
  font-family:'Noto Sans JP',sans-serif;font-weight:600;border-radius:4px;
  cursor:pointer;margin-top:16px;letter-spacing:1px;
  box-shadow:0 4px 16px rgba(184,150,90,0.3);
  transition:transform 0.2s;
}
#agari-overlay .agari-btn:hover{transform:translateY(-2px)}

/* ===== GAME LAYOUT ===== */
#game{display:flex;flex-direction:column;width:100%;height:100%;position:relative;background:var(--bg)}

/* Info Bar */
#info-bar{
  height:40px;min-height:40px;display:flex;align-items:center;
  background:rgba(28,28,30,0.95);border-bottom:1px solid rgba(184,150,90,0.4);
  padding:0 14px;gap:14px;font-size:12px;z-index:10;
  backdrop-filter:blur(4px);
}
#info-bar .remain{font-family:'Noto Serif JP',serif;font-size:20px;color:var(--gold);transition:color 0.3s}
#info-bar .remain.warning{color:var(--red);animation:remainPulse 1s infinite}
@keyframes remainPulse{0%,100%{opacity:1}50%{opacity:0.6}}
#info-bar .remain-label{font-size:10px;color:var(--highlight);opacity:0.5;margin-right:2px;font-weight:100}
#info-bar .round-info{border-left:1px solid var(--border);padding-left:14px;font-weight:600;letter-spacing:1px}
#info-bar .honba{font-weight:300;font-size:11px;color:var(--highlight);opacity:0.6;margin-left:6px}
#info-bar .kyotaku{font-weight:300;font-size:11px;color:var(--gold);opacity:0.8;margin-left:4px}
#info-bar .dora-area{display:flex;align-items:center;gap:3px;margin-left:auto}
#info-bar .dora-label{font-size:10px;color:var(--gold);opacity:0.6;margin-right:6px;font-weight:100;letter-spacing:2px}

/* Sound toggle in info bar */
.sound-toggle{
  margin-left:8px;cursor:pointer;font-size:16px;opacity:0.6;
  transition:opacity 0.2s;padding:2px 4px;
}
.sound-toggle:hover{opacity:1}
/* Settings gear in info bar */
.settings-toggle{
  margin-left:4px;cursor:pointer;font-size:14px;opacity:0.5;
  transition:opacity 0.2s;padding:2px 4px;
}
.settings-toggle:hover{opacity:0.9}

/* Shanten display */
#shanten-display{
  font-size:11px;color:var(--teal);margin-left:8px;padding:2px 8px;
  border:1px solid rgba(91,138,143,0.3);border-radius:3px;
  background:rgba(91,138,143,0.08);white-space:nowrap;
}
#shanten-display.tenpai{color:var(--gold);border-color:rgba(184,150,90,0.4);background:rgba(184,150,90,0.1)}
#shanten-display.agari{color:#4CAF50;border-color:rgba(76,175,80,0.4);background:rgba(76,175,80,0.1)}

#machi-display{
  font-size:10px;color:var(--gold);margin-left:4px;opacity:0.8;white-space:nowrap;
}

/* Dora tile */
.dora-tile{
  width:26px;height:35px;background:var(--tile-base);border-radius:2px;
  display:flex;align-items:center;justify-content:center;font-size:11px;
  color:var(--tile-text);font-weight:600;position:relative;
  box-shadow:1px 1px 4px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.3);
  background-image:linear-gradient(to bottom,rgba(255,255,255,0.2) 0%,rgba(255,255,255,0.05) 50%,rgba(0,0,0,0.05) 100%);
}
.dora-tile.shown{
  animation:doraReveal 0.4s ease-out;
  box-shadow:1px 1px 4px rgba(0,0,0,0.5),0 0 12px rgba(184,150,90,0.3),inset 0 1px 0 rgba(255,255,255,0.3);
}
@keyframes doraReveal{0%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
.dora-tile.back{background:var(--tile-back);color:transparent;background-image:none;box-shadow:1px 1px 3px rgba(0,0,0,0.3)}

/* Timer bar */
#timer-bar{
  height:3px;min-height:3px;background:var(--bg2);position:relative;z-index:10;
}
#timer-progress{
  height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));
  width:100%;transition:width 0.5s linear;
  box-shadow:0 0 6px rgba(91,138,143,0.4);
}
#timer-progress.warning{background:linear-gradient(90deg,var(--red),#A02020);box-shadow:0 0 6px rgba(139,26,26,0.5)}

/* Main Area */
#main-area{flex:1;display:flex;position:relative;overflow:hidden}
#left-panel,#right-panel{
  width:84px;min-width:84px;display:flex;flex-direction:column;align-items:center;
  padding:8px 4px;background:rgba(28,28,30,0.85);
  border-right:1px solid rgba(61,61,64,0.5);font-size:11px;gap:3px;z-index:5;
}
#right-panel{border-right:none;border-left:1px solid rgba(61,61,64,0.5)}
.side-name{font-weight:600;font-size:11px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px}
.side-wind{font-size:12px;color:var(--highlight);opacity:0.7}
.side-score{font-family:'Noto Serif JP',serif;font-size:15px;color:var(--gold);margin-top:2px}
.side-tiles{display:flex;flex-direction:column;gap:1px;margin-top:6px}
.side-tile-back{
  width:14px;height:18px;background:var(--tile-back);border-radius:1px;
  border:1px solid rgba(28,28,30,0.3);
  box-shadow:0 1px 2px rgba(0,0,0,0.2);
}
.side-melds{margin-top:4px;display:flex;flex-direction:column;gap:2px;font-size:8px}
.side-riichi-mark{color:var(--red);font-size:10px;font-weight:600;letter-spacing:2px;margin-top:4px}

/* Table */
#table-area{
  flex:1;position:relative;background:var(--table);
  background-image:
    radial-gradient(ellipse 60% 50% at center, rgba(230,210,160,0.09) 0%, transparent 70%),
    radial-gradient(circle at 50% 50%, rgba(184,150,90,0.03) 0%, transparent 50%);
}
#table-area::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 40% 35% at 50% 45%, rgba(255,250,230,0.04) 0%, transparent 100%);
  pointer-events:none;z-index:1;
  animation:spotlightBreath 4s ease-in-out infinite alternate;
}
@keyframes spotlightBreath{0%{opacity:0.7}100%{opacity:1}}

/* Center Panel */
#center-panel{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:116px;height:116px;
  background:rgba(36,36,38,0.92);
  border:1px solid rgba(184,150,90,0.5);border-radius:6px;
  padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;font-size:10px;z-index:5;
  box-shadow:0 4px 20px rgba(0,0,0,0.4),inset 0 0 20px rgba(184,150,90,0.03);
  backdrop-filter:blur(4px);
}
#center-panel .wind-big{
  font-family:'Noto Serif JP',serif;font-size:22px;color:var(--gold);
  font-weight:900;letter-spacing:2px;
  text-shadow:0 0 12px rgba(184,150,90,0.3);
}
.cp-row{display:flex;align-items:center;gap:4px;padding:1px 6px;border-radius:3px;transition:all 0.3s}
.cp-wind{font-size:10px;color:var(--highlight);font-weight:300;opacity:0.7}
.cp-score{font-family:'Noto Serif JP',serif;font-size:12px;color:var(--gold)}
.cp-active{
  box-shadow:inset 0 0 10px rgba(184,150,90,0.2);
  background:rgba(184,150,90,0.1);
  border:1px solid rgba(184,150,90,0.2);
}

/* Discard Areas */
.discard-area{position:absolute;display:flex;flex-wrap:wrap;gap:1px;z-index:3}
#discard-self{bottom:105px;left:50%;transform:translateX(-50%);width:168px;flex-direction:row}
#discard-opp{top:55px;left:50%;transform:translateX(-50%);width:144px;flex-direction:row}
#discard-left{left:22px;top:50%;transform:translateY(-50%);width:96px;flex-direction:row;flex-wrap:wrap}
#discard-right{right:22px;top:50%;transform:translateY(-50%);width:96px;flex-direction:row;flex-wrap:wrap}

.disc-tile{
  border-radius:2px;display:flex;align-items:center;justify-content:center;
  font-weight:600;cursor:default;position:relative;
  background-image:linear-gradient(to bottom,rgba(255,255,255,0.15) 0%,rgba(255,255,255,0.03) 50%,rgba(0,0,0,0.05) 100%);
  box-shadow:1px 1px 3px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.2);
  transition:box-shadow 0.2s;
}
#discard-self .disc-tile,#discard-opp .disc-tile{width:25px;height:34px;font-size:11px}
#discard-left .disc-tile,#discard-right .disc-tile{width:21px;height:29px;font-size:9px}
.disc-tile.normal{background-color:var(--tile-base);color:var(--tile-text)}
.disc-tile.riichi-mark{background-color:var(--tile-base);color:var(--tile-text);transform:rotate(90deg);margin:0 4px}
.disc-tile.called{opacity:0.3}
.disc-tile.tsumogiri{filter:brightness(0.75)}
.disc-tile.latest{
  box-shadow:0 0 10px rgba(184,150,90,0.6),0 0 20px rgba(184,150,90,0.2),1px 1px 3px rgba(0,0,0,0.4);
  animation:latestTileGlow 1.5s ease-in-out infinite alternate;
}
@keyframes latestTileGlow{0%{box-shadow:0 0 8px rgba(184,150,90,0.4),1px 1px 3px rgba(0,0,0,0.4)}100%{box-shadow:0 0 14px rgba(184,150,90,0.7),0 0 24px rgba(184,150,90,0.2),1px 1px 3px rgba(0,0,0,0.4)}}
.disc-tile.red-tile{background-color:#F5EDE0}

.disc-tile.dealing{animation:discardFly 0.25s ease-out}
@keyframes discardFly{
  0%{transform:translateY(30px) scale(1.2);opacity:0.3}
  100%{transform:translateY(0) scale(1);opacity:1}
}

/* Opponent top */
#opp-top{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:3px;z-index:5;
}
#opp-top .opp-tiles{display:flex;gap:1px}
.opp-tile-back{
  width:14px;height:18px;background:var(--tile-back);border-radius:1px;
  border:1px solid rgba(28,28,30,0.3);
  box-shadow:0 1px 2px rgba(0,0,0,0.2);
}
#opp-top .opp-info{display:flex;align-items:center;gap:8px;font-size:11px}
#opp-top .opp-name{font-weight:600;letter-spacing:1px}
#opp-top .opp-score{font-family:'Noto Serif JP',serif;font-size:14px;color:var(--gold)}

/* ===== HAND AREA ===== */
#hand-area{
  height:82px;min-height:82px;display:flex;align-items:center;justify-content:center;
  background:var(--bg);border-top:1px solid rgba(61,61,64,0.6);
  padding:0 10px;gap:2px;z-index:10;flex-wrap:nowrap;overflow-x:auto;
}

.hand-tile{
  width:42px;height:58px;
  background-color:var(--tile-base);
  border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;color:var(--tile-text);
  cursor:pointer;flex-shrink:0;position:relative;
  background-image:
    linear-gradient(to bottom, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.08) 20%, transparent 50%, rgba(0,0,0,0.03) 80%, rgba(0,0,0,0.12) 100%);
  box-shadow:
    1px 2px 5px rgba(0,0,0,0.5),
    0 1px 0 rgba(255,255,255,0.4),
    inset 0 -2px 4px rgba(0,0,0,0.06),
    inset 0 2px 4px rgba(255,255,255,0.15);
  transition:transform 0.15s ease-out, box-shadow 0.15s ease-out;
  border-top:1px solid rgba(255,255,255,0.35);
  border-left:1px solid rgba(255,255,255,0.1);
  border-right:1px solid rgba(0,0,0,0.08);
  border-bottom:1px solid rgba(0,0,0,0.15);
}
.hand-tile::after{
  content:'';position:absolute;top:2px;left:3px;right:3px;height:30%;
  background:linear-gradient(to bottom, rgba(255,255,255,0.12), transparent);
  border-radius:2px 2px 50% 50%;pointer-events:none;
}
.hand-tile:hover{
  transform:translateY(-8px);
  box-shadow:
    2px 4px 10px rgba(0,0,0,0.6),
    0 0 12px rgba(184,150,90,0.2),
    inset 0 -2px 4px rgba(0,0,0,0.06),
    inset 0 2px 4px rgba(255,255,255,0.15);
}
.hand-tile.selected{
  transform:translateY(-14px);
  box-shadow:
    2px 6px 16px rgba(0,0,0,0.5),
    0 0 20px rgba(184,150,90,0.5),
    0 0 40px rgba(184,150,90,0.15),
    inset 0 -2px 4px rgba(0,0,0,0.06),
    inset 0 2px 4px rgba(255,255,255,0.15);
}
.hand-tile.tsumo-tile{
  margin-left:10px;
  box-shadow:
    1px 2px 5px rgba(0,0,0,0.5),
    0 1px 0 rgba(255,255,255,0.4),
    0 0 10px rgba(91,138,143,0.3),
    inset 0 -2px 4px rgba(0,0,0,0.06),
    inset 0 2px 4px rgba(255,255,255,0.15);
}
.hand-tile.riichi-dim{opacity:0.4;pointer-events:none;filter:grayscale(0.3)}
.hand-tile.dragging{opacity:0.4;transform:scale(0.9)}

.hand-tile.red-dora{
  background-color:#F5EDE0;
  box-shadow:
    1px 2px 5px rgba(0,0,0,0.5),
    0 1px 0 rgba(255,255,255,0.4),
    0 0 8px rgba(139,26,26,0.2),
    inset 0 -2px 4px rgba(139,26,26,0.05),
    inset 0 2px 4px rgba(255,255,255,0.15);
}
.hand-tile.red-dora.selected{
  box-shadow:
    2px 6px 16px rgba(0,0,0,0.5),
    0 0 20px rgba(139,26,26,0.4),
    0 0 40px rgba(139,26,26,0.15),
    inset 0 -2px 4px rgba(139,26,26,0.05),
    inset 0 2px 4px rgba(255,255,255,0.15);
}

.hand-meld{display:flex;gap:1px;margin-right:8px;flex-shrink:0}
.hand-meld .meld-tile{
  width:32px;height:44px;background-color:var(--tile-base);border-radius:2px;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
  color:var(--tile-text);
  box-shadow:1px 1px 4px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.2);
  background-image:linear-gradient(to bottom,rgba(255,255,255,0.2) 0%,rgba(255,255,255,0.05) 50%,rgba(0,0,0,0.05) 100%);
}
.hand-meld .meld-tile.sideways{width:44px;height:32px;font-size:11px}
.hand-meld .meld-tile.kan-back{
  background-color:var(--tile-back);color:transparent;
  background-image:none;
}

/* Drag ghost */
#drag-ghost{
  position:fixed;z-index:200;pointer-events:none;opacity:0.85;
  transition:none;
}

/* ===== BUTTON AREA ===== */
#btn-area{
  height:52px;min-height:52px;display:flex;align-items:center;justify-content:flex-end;
  padding:0 16px;gap:10px;background:var(--bg);z-index:10;
}
.action-btn{
  border:none;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-weight:600;
  cursor:pointer;height:42px;font-size:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.4);
  transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;
  letter-spacing:1px;
  animation:btnSlideUp 0.25s ease-out;
}
@keyframes btnSlideUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
.action-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,0.5)}
.action-btn:active{transform:translateY(0)}

.btn-chi,.btn-pon,.btn-kan{
  background:linear-gradient(135deg,rgba(91,138,143,0.95),rgba(71,118,123,0.95));
  color:var(--highlight);border:1px solid rgba(91,138,143,0.6);
  padding:0 22px;
}
.btn-riichi{
  background:linear-gradient(135deg,#9B2020,var(--red),#6B1515);
  color:var(--white);border:none;padding:0 28px;font-size:16px;
  box-shadow:0 3px 12px rgba(139,26,26,0.5);
  animation:btnSlideUp 0.25s ease-out,riichiPulse 1.5s ease-in-out infinite;
}
@keyframes riichiPulse{0%,100%{box-shadow:0 3px 12px rgba(139,26,26,0.4)}50%{box-shadow:0 3px 20px rgba(139,26,26,0.7),0 0 30px rgba(139,26,26,0.2)}}

.btn-tsumo,.btn-ron{
  background:linear-gradient(135deg,#D4B06A,var(--gold),#9A7A42);
  color:var(--bg);border:none;padding:0 28px;height:46px;font-size:18px;
  letter-spacing:2px;
  box-shadow:0 3px 16px rgba(184,150,90,0.5);
  animation:btnSlideUp 0.25s ease-out,winBtnPulse 1s ease-in-out infinite;
}
@keyframes winBtnPulse{0%,100%{box-shadow:0 3px 16px rgba(184,150,90,0.4);transform:scale(1)}50%{box-shadow:0 5px 24px rgba(184,150,90,0.7),0 0 40px rgba(184,150,90,0.2);transform:scale(1.03)}}

.btn-pass{
  background:var(--bg);color:var(--highlight);opacity:0.5;
  border:1px solid var(--border);padding:0 18px;
  animation:btnSlideUp 0.25s ease-out;
}
.btn-pass:hover{opacity:0.7}
.btn-skip{background:var(--bg2);color:var(--highlight);border:1px solid var(--border);font-size:13px;padding:0 16px}

/* ===== RIICHI LINE ===== */
.riichi-line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);z-index:4;transform:scaleX(0);transition:transform 0.5s ease-out;box-shadow:0 0 8px rgba(139,26,26,0.4)}
.riichi-line.active{transform:scaleX(1)}
#riichi-line-self{bottom:82px;left:0;right:0;transform-origin:left}
#riichi-line-opp{top:42px;left:0;right:0;transform-origin:right}
#riichi-line-left{top:0;bottom:0;left:84px;width:2px;height:100%;transform:scaleY(0);transform-origin:top;background:linear-gradient(180deg,transparent,var(--red),transparent)}
#riichi-line-left.active{transform:scaleY(1)}
#riichi-line-right{top:0;bottom:0;right:84px;width:2px;height:100%;transform:scaleY(0);transform-origin:bottom;background:linear-gradient(180deg,transparent,var(--red),transparent)}
#riichi-line-right.active{transform:scaleY(1)}

/* ===== TUTORIAL OVERLAY ===== */
#tutorial-overlay{
  position:fixed;inset:0;background:rgba(10,10,12,0.92);z-index:150;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#tutorial-overlay .tutorial-card{
  background:var(--bg2);border:1px solid rgba(184,150,90,0.4);border-radius:8px;
  padding:32px 40px;max-width:420px;text-align:center;
  box-shadow:0 16px 48px rgba(0,0,0,0.6);
}
#tutorial-overlay .tutorial-step{font-size:11px;color:var(--gold);margin-bottom:12px;letter-spacing:2px}
#tutorial-overlay h3{font-family:'Noto Serif JP',serif;font-size:22px;margin-bottom:16px;color:var(--white)}
#tutorial-overlay p{font-size:13px;line-height:1.8;color:var(--highlight);margin-bottom:24px;opacity:0.8}
#tutorial-overlay .tutorial-btns{display:flex;gap:10px;justify-content:center;align-items:center}
#tutorial-overlay .tutorial-btns button{
  padding:10px 28px;border-radius:4px;font-family:'Noto Sans JP',sans-serif;
  font-size:13px;cursor:pointer;letter-spacing:1px;transition:transform 0.2s;
}
#tutorial-overlay .tutorial-btns .tut-next{
  background:linear-gradient(135deg,#C4A265,#B8965A);color:var(--bg);border:none;font-weight:600;
}
#tutorial-overlay .tutorial-btns .tut-skip{
  background:transparent;color:var(--highlight);border:1px solid var(--border);opacity:0.6;
}
#tutorial-overlay .tutorial-dots{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
#tutorial-overlay .tutorial-dots .dot{
  width:8px;height:8px;border-radius:50%;background:var(--border);transition:background 0.3s;
}
#tutorial-overlay .tutorial-dots .dot.active{background:var(--gold)}
#tutorial-overlay .no-show-label{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:16px;font-size:11px;color:var(--highlight);opacity:0.5;cursor:pointer;
}
#tutorial-overlay .no-show-label input{accent-color:var(--gold)}

/* ===== SETTINGS MODAL ===== */
#settings-modal{
  position:fixed;inset:0;background:rgba(10,10,12,0.88);z-index:140;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#settings-modal .settings-card{
  background:var(--bg2);border:1px solid rgba(184,150,90,0.4);border-radius:8px;
  padding:28px 36px;min-width:340px;max-width:400px;
  box-shadow:0 16px 48px rgba(0,0,0,0.6);
}
#settings-modal h3{
  font-family:'Noto Serif JP',serif;font-size:20px;margin-bottom:20px;
  color:var(--gold);text-align:center;letter-spacing:2px;
}
.settings-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid rgba(61,61,64,0.4);
  font-size:13px;
}
.settings-row label{color:var(--highlight);opacity:0.8}
.settings-row select,.settings-row input[type=range]{
  accent-color:var(--gold);
}
.settings-row select{
  background:var(--bg);color:var(--white);border:1px solid var(--border);
  padding:4px 8px;border-radius:4px;font-size:12px;font-family:'Noto Sans JP',sans-serif;
}
.settings-close{
  display:block;margin:20px auto 0;padding:10px 32px;
  background:linear-gradient(135deg,#C4A265,#B8965A);color:var(--bg);border:none;
  border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-weight:600;
  font-size:13px;cursor:pointer;letter-spacing:1px;
}
.settings-row .toggle-switch{
  position:relative;width:44px;height:24px;cursor:pointer;
}
.settings-row .toggle-switch input{opacity:0;width:0;height:0}
.settings-row .toggle-switch .slider{
  position:absolute;inset:0;background:var(--border);border-radius:12px;
  transition:background 0.3s;
}
.settings-row .toggle-switch .slider::before{
  content:'';position:absolute;width:18px;height:18px;border-radius:50%;
  background:var(--white);left:3px;top:3px;transition:transform 0.3s;
}
.settings-row .toggle-switch input:checked + .slider{background:var(--gold)}
.settings-row .toggle-switch input:checked + .slider::before{transform:translateX(20px)}

/* ===== STATS MODAL ===== */
#stats-modal{
  position:fixed;inset:0;background:rgba(10,10,12,0.88);z-index:140;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#stats-modal .stats-card{
  background:var(--bg2);border:1px solid rgba(184,150,90,0.4);border-radius:8px;
  padding:28px 36px;min-width:320px;
  box-shadow:0 16px 48px rgba(0,0,0,0.6);text-align:center;
}
#stats-modal h3{
  font-family:'Noto Serif JP',serif;font-size:20px;margin-bottom:20px;
  color:var(--gold);letter-spacing:2px;
}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.stats-item{text-align:center}
.stats-item .stats-val{font-family:'Noto Serif JP',serif;font-size:24px;color:var(--gold)}
.stats-item .stats-label{font-size:10px;color:var(--highlight);opacity:0.5;margin-top:2px}
.stats-reset{
  background:transparent;border:1px solid rgba(139,26,26,0.4);color:var(--red);
  padding:6px 16px;font-size:11px;border-radius:4px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;margin-top:12px;
}
.stats-close{
  display:block;margin:16px auto 0;padding:10px 32px;
  background:linear-gradient(135deg,#C4A265,#B8965A);color:var(--bg);border:none;
  border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-weight:600;
  font-size:13px;cursor:pointer;letter-spacing:1px;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(46,46,48,0.95);color:var(--white);padding:10px 24px;
  border-radius:6px;font-size:13px;z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);border:1px solid rgba(184,150,90,0.3);
  animation:toastIn 0.3s ease-out;pointer-events:none;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ===== FOOTER ===== */
#game-footer{
  position:absolute;bottom:0;left:0;right:0;
  text-align:center;font-size:9px;color:var(--highlight);opacity:0.3;
  padding:4px;pointer-events:none;z-index:1;
}

/* ===== RESPONSIVE ===== */
@media(max-width:700px){
  .hand-tile{width:32px;height:46px;font-size:14px}
  .hand-tile.tsumo-tile{margin-left:8px}
  #left-panel,#right-panel{width:62px;min-width:62px;font-size:9px}
  #discard-self .disc-tile,#discard-opp .disc-tile{width:21px;height:29px;font-size:9px}
  #center-panel{width:94px;height:94px}
  #info-bar{font-size:10px;height:34px;min-height:34px}
  #hand-area{height:66px;min-height:66px}
  #btn-area{height:46px;min-height:46px}
  .action-btn{height:38px;font-size:13px}
  #title-screen h1{font-size:40px;letter-spacing:10px}
}
@media(min-width:1100px){
  .hand-tile{width:50px;height:70px;font-size:21px}
  .hand-tile.tsumo-tile{margin-left:12px}
  #left-panel,#right-panel{width:104px}
  #discard-self .disc-tile,#discard-opp .disc-tile{width:30px;height:40px;font-size:13px}
  #center-panel{width:136px;height:136px}
  #hand-area{height:92px;min-height:92px}
  #info-bar{height:44px;min-height:44px}
  .side-score{font-size:16px}
}

/* Landscape warning */
@media(orientation:portrait){
  #landscape-warn{display:flex!important}
  #app{display:none!important}
}
#landscape-warn{
  display:none;position:fixed;inset:0;background:var(--bg);
  align-items:center;justify-content:center;flex-direction:column;z-index:200;
  color:var(--white);font-size:15px;gap:16px;letter-spacing:1px;
}
#landscape-warn .icon{font-size:48px;opacity:0.4}
#landscape-warn .hint{font-size:12px;color:var(--highlight);opacity:0.5}

/* ===== REDUCED MOTION ===== */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms!important;animation-iteration-count:1!important;
    transition-duration:0.01ms!important;
  }
}
</style>
</head>
<body>
<div id="landscape-warn">
  <div class="icon" aria-hidden="true">&#x1F4F1;</div>
  <div>画面を横向きにしてください</div>
  <div class="hint">Rotate your device to landscape</div>
</div>
<div id="app">
<!-- Title -->
<div id="title-screen">
<h1>雀凛</h1>
<div class="title-line" aria-hidden="true"></div>
<div class="sub">- JANRIN -</div>
<div class="title-stats" id="title-stats"></div>
<button onclick="startGame()" aria-label="対局を開始する">対局開始</button>
<div class="title-bottom-btns">
  <button onclick="showStatsModal()">戦績</button>
  <button onclick="showSettingsModal()">設定</button>
</div>
</div>

<!-- Result -->
<div id="result-screen" class="hidden" role="dialog" aria-label="対局結果">
<h2>対局結果</h2>
<div class="result-line" aria-hidden="true"></div>

<script>
"use strict";

// ===== SETTINGS & STATE =====
const SETTINGS_KEY = 'janrin_settings';
const STATS_KEY = 'janrin_stats';
const TUTORIAL_KEY = 'janrin_tutorial_done';

let Settings = loadSettings();
function loadSettings() {
  try {
    let s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (s) return s;
  } catch(e) {}
  return {soundEnabled:true, effectsEnabled:true, shantenEnabled:true, aiSpeed:'normal', volume:0.5};
}
function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(Settings)); }

function loadStats() {
  try {
    let s = JSON.parse(localStorage.getItem(STATS_KEY));
    if (s && Array.isArray(s.results)) return s;
  } catch(e) {}
  return {results:[]};
}
function saveStats(stats) { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }

function getAiDelay() {
  if (Settings.aiSpeed === 'fast') return 150;
  if (Settings.aiSpeed === 'slow') return 800;
  return 400;
}

// ===== SOUND ENGINE (Web Audio API, OscillatorNode only) =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTsumoSound() {
  if (!Settings.soundEnabled) return;
  const ctx = getAudioCtx();
  const g = ctx.createGain();
  g.gain.setValueAtTime(Settings.volume * 0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  g.connect(ctx.destination);
  const o = ctx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(800, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.03);
  o.connect(g);
  o.start(ctx.currentTime);
  o.stop(ctx.currentTime + 0.08);
}

function playDahaiSound() {
  if (!Settings.soundEnabled) return;
  const ctx = getAudioCtx();
  const g = ctx.createGain();
  g.gain.setValueAtTime(Settings.volume * 0.25, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  g.connect(ctx.destination);
  // White noise burst for tile-on-table sound
  const bufferSize = ctx.sampleRate * 0.15;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.02));
  }
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  // Bandpass to make it sound like a tile click
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 2000;
  bp.Q.value = 2;
  noise.connect(bp);
  bp.connect(g);
  noise.start(ctx.currentTime);
  noise.stop(ctx.currentTime + 0.15);
}

function playAgariSound() {
  if (!Settings.soundEnabled) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  // Chime: three ascending tones
  const notes = [523, 659, 784]; // C5 E5 G5
  notes.forEach((freq, i) => {
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now + i * 0.15);
    g.gain.linearRampToValueAtTime(Settings.volume * 0.2, now + i * 0.15 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.5);
    g.connect(ctx.destination);
    const o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq;
    o.connect(g);
    o.start(now + i * 0.15);
    o.stop(now + i * 0.15 + 0.5);
  });
}

function playRiichiSound() {
  if (!Settings.soundEnabled) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  // Sharp rising tone
  const g = ctx.createGain();
  g.gain.setValueAtTime(Settings.volume * 0.2, now);
  g.gain.linearRampToValueAtTime(Settings.volume * 0.3, now + 0.1);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  g.connect(ctx.destination);
  const o = ctx.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(440, now);
  o.frequency.exponentialRampToValueAtTime(880, now + 0.15);
  o.connect(g);
  o.start(now);
  o.stop(now + 0.4);
}

function toggleSound() {
  Settings.soundEnabled = !Settings.soundEnabled;
  saveSettings();
  updateSoundIcon();
}

function updateSoundIcon() {
  const el = document.getElementById('sound-toggle');
  if (el) el.innerHTML = Settings.soundEnabled ? '&#x1F50A;' : '&#x1F507;';
}

// ===== TOAST =====
function showToast(msg) {
  let existing = document.querySelector('.toast');
  if (existing) existing.remove();
  let t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ===== TUTORIAL =====
function showTutorial() {
  if (localStorage.getItem(TUTORIAL_KEY) === '1') return;
  const steps = [
    {title:'牌の選択と打牌', desc:'牌を1回タップで選択。\nもう1回タップで打牌（捨てる）します。\nドラッグ&ドロップでも打牌できます。'},
    {title:'鳴き・立直', desc:'相手の捨て牌に対して\nチー・ポン・カンのボタンが表示されます。\nテンパイ時は「立直」ボタンが光ります。'},
    {title:'ロン・ツモで和了', desc:'和了できるとき「ロン」「ツモ」ボタンが\n出現します。タップして和了しましょう。\n東風戦（4局）で対局します。'},
  ];
  let step = 0;
  const overlay = document.createElement('div');
  overlay.id = 'tutorial-overlay';

  function renderStep() {
    overlay.innerHTML = `
      <div class="tutorial-card">
        <div class="tutorial-step">STEP ${step+1} / ${steps.length}</div>
        <div class="tutorial-dots">${steps.map((_,i) => `<div class="dot${i===step?' active':''}"></div>`).join('')}</div>
        <h3>${steps[step].title}</h3>
        <p>${steps[step].desc.replace(/\n/g,'<br>')}</p>
        <div class="tutorial-btns">
          <button class="tut-skip" onclick="closeTutorial()">スキップ</button>
          <button class="tut-next" id="tut-next-btn">${step === steps.length-1 ? 'はじめる' : '次へ'}</button>
        </div>
        <label class="no-show-label"><input type="checkbox" id="tut-noshow">もう表示しない</label>
      </div>
    `;
    document.getElementById('tut-next-btn').onclick = () => {
      if (step < steps.length - 1) { step++; renderStep(); }
      else closeTutorial();
    };
  }

  window.closeTutorial = function() {
    const cb = document.getElementById('tut-noshow');
    if (cb && cb.checked) localStorage.setItem(TUTORIAL_KEY, '1');
    overlay.remove();
  };

  renderStep();
  document.body.appendChild(overlay);
}

// ===== SETTINGS MODAL =====
function showSettingsModal() {
  if (document.getElementById('settings-modal')) return;
  const m = document.createElement('div');
  m.id = 'settings-modal';
  m.innerHTML = `
    <div class="settings-card">
      <h3>設定</h3>
      <div class="settings-row"><label>AI打牌速度</label>
        <select id="set-speed">
          <option value="fast"${Settings.aiSpeed==='fast'?' selected':''}>速い</option>
          <option value="normal"${Settings.aiSpeed==='normal'?' selected':''}>普通</option>
          <option value="slow"${Settings.aiSpeed==='slow'?' selected':''}>遅い</option>
        </select>
      </div>
      <div class="settings-row"><label>演出</label>
        <label class="toggle-switch"><input type="checkbox" id="set-effects"${Settings.effectsEnabled?' checked':''}><span class="slider"></span></label>
      </div>
      <div class="settings-row"><label>サウンド</label>
        <label class="toggle-switch"><input type="checkbox" id="set-sound"${Settings.soundEnabled?' checked':''}><span class="slider"></span></label>
      </div>
      <div class="settings-row"><label>音量</label>
        <input type="range" id="set-volume" min="0" max="1" step="0.1" value="${Settings.volume}" style="width:100px">
      </div>
      <div class="settings-row"><label>向聴数表示</label>
        <label class="toggle-switch"><input type="checkbox" id="set-shanten"${Settings.shantenEnabled?' checked':''}><span class="slider"></span></label>
      </div>
      <button class="settings-close" onclick="closeSettingsModal()">閉じる</button>
    </div>
  `;
  document.body.appendChild(m);
  m.addEventListener('click', (e) => { if (e.target === m) closeSettingsModal(); });
}
function closeSettingsModal() {
  const m = document.getElementById('settings-modal');
  if (!m) return;
  Settings.aiSpeed = document.getElementById('set-speed').value;
  Settings.effectsEnabled = document.getElementById('set-effects').checked;
  Settings.soundEnabled = document.getElementById('set-sound').checked;
  Settings.volume = parseFloat(document.getElementById('set-volume').value);
  Settings.shantenEnabled = document.getElementById('set-shanten').checked;
  saveSettings();
  updateSoundIcon();
  m.remove();
}

// ===== STATS MODAL =====
function showStatsModal() {
  if (document.getElementById('stats-modal')) return;
  const stats = loadStats();
  const total = stats.results.length;
  let first = 0, avgRank = 0;
  if (total > 0) {
    first = stats.results.filter(r => r.rank === 1).length;
    avgRank = stats.results.reduce((s, r) => s + r.rank, 0) / total;
  }
  const m = document.createElement('div');
  m.id = 'stats-modal';
  m.innerHTML = `
    <div class="stats-card">
      <h3>戦績</h3>
      <div class="stats-grid">
        <div class="stats-item"><div class="stats-val">${total}</div><div class="stats-label">対局数</div></div>
        <div class="stats-item"><div class="stats-val">${total > 0 ? (first/total*100).toFixed(1)+'%' : '-'}</div><div class="stats-label">1位率</div></div>
        <div class="stats-item"><div class="stats-val">${total > 0 ? avgRank.toFixed(2) : '-'}</div><div class="stats-label">平均順位</div></div>
      </div>
      <button class="stats-reset" onclick="resetStats()">戦績リセット</button>
      <button class="stats-close" onclick="document.getElementById('stats-modal').remove()">閉じる</button>
    </div>
  `;
  document.body.appendChild(m);
  m.addEventListener('click', (e) => { if (e.target === m) m.remove(); });
}
function resetStats() {
  if (confirm('戦績をリセットしますか?')) {
    saveStats({results:[]});
    document.getElementById('stats-modal').remove();
    updateTitleStats();
    showToast('戦績をリセットしました');
  }
}

function updateTitleStats() {
  const el = document.getElementById('title-stats');
  if (!el) return;
  const stats = loadStats();
  const total = stats.results.length;
  if (total === 0) { el.textContent = ''; return; }
  let first = stats.results.filter(r => r.rank === 1).length;
  let avgRank = stats.results.reduce((s, r) => s + r.rank, 0) / total;
  el.textContent = `対局${total}回 | 1位率${(first/total*100).toFixed(1)}% | 平均順位${avgRank.toFixed(2)}`;
}

function recordResult(rank, score) {
  const stats = loadStats();
  stats.results.push({rank, score, date: new Date().toISOString()});
  if (stats.results.length > 50) stats.results = stats.results.slice(-50);
  saveStats(stats);
}

let lastResultData = null;

function copyResultToClipboard() {
  if (!lastResultData) return;
  const text = `雀凛で${lastResultData.rank}位! ${lastResultData.score.toLocaleString()}点 #雀凛 #JANRIN`;
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました')).catch(() => showToast('コピーに失敗しました'));

function shareToX() {
  if (!lastResultData) return;
  const text = `雀凛で${lastResultData.rank}位! ${lastResultData.score.toLocaleString()}点 #雀凛 #JANRIN`;
