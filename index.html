// ===== TILE DEFINITIONS =====
const SUIT_NAMES = ['萬','筒','索','風','三元'];
const WIND_NAMES = ['','東','南','西','北'];
const DRAGON_NAMES = ['','白','發','中'];

function tileLabel(t) {
  if (!t) return '?';
  if (t.suit <= 2) {
    const nums = ['','一','二','三','四','五','六','七','八','九'];
    const suits = ['萬','筒','索'];
    let n = t.red ? '赤' + nums[5] : nums[t.num];
    return n + suits[t.suit];
  }
  if (t.suit === 3) return WIND_NAMES[t.num];
  if (t.suit === 4) return DRAGON_NAMES[t.num];
  return '?';
}

function tileShort(t) {
  if (!t) return '?';
  if (t.suit <= 2) {
    const s = ['m','p','s'][t.suit];
    return (t.red ? '0' : t.num) + s;
  }
  if (t.suit === 3) return WIND_NAMES[t.num];
  if (t.suit === 4) return DRAGON_NAMES[t.num];
  return '?';
}

function tileDisplay(t) {
  if (!t) return '?';
  if (t.suit === 0) {
    const ch = ['','一','二','三','四','五','六','七','八','九'];
    return (t.red ? '五' : ch[t.num]);
  }
  if (t.suit === 1) {
    const ch = ['','①','②','③','④','⑤','⑥','⑦','⑧','⑨'];
    return (t.red ? '⑤' : ch[t.num]);
  }
  if (t.suit === 2) {
    const ch = ['','1','2','3','4','5','6','7','8','9'];
    return (t.red ? '5' : ch[t.num]);
  }
  if (t.suit === 3) return WIND_NAMES[t.num];
  if (t.suit === 4) return DRAGON_NAMES[t.num];
  return '?';
}

function tileColor(t) {
  if (!t) return '#1C1010';
  if (t.red) return '#A02020';
  if (t.suit === 0) return '#1C1010';
  if (t.suit === 1) return '#1A3A6E';
  if (t.suit === 2) return '#1A5A2A';
  if (t.suit === 3) return '#1C1010';
  if (t.suit === 4) {
    if (t.num === 2) return '#1A5A2A';
    if (t.num === 3) return '#8B1A1A';
    return '#1C1010';
  }
  return '#1C1010';
}

function tileSortKey(t) {
  return t.suit * 100 + (t.red ? t.num - 0.5 : t.num);
}

function tilesEqual(a, b) {
  return a.suit === b.suit && a.num === b.num;
}

function tileKey(t) {
  return t.suit * 10 + t.num;
}

function createAllTiles() {
  let tiles = [];
  let id = 0;
  for (let suit = 0; suit <= 2; suit++) {
    for (let num = 1; num <= 9; num++) {
      for (let copy = 0; copy < 4; copy++) {
        let red = false;
        if (num === 5 && copy === 0) red = true;
        tiles.push({ suit, num, red, id: id++ });
      }
    }
  }
  for (let num = 1; num <= 4; num++) {
    for (let copy = 0; copy < 4; copy++) {
      tiles.push({ suit: 3, num, red: false, id: id++ });
    }
  }
  for (let num = 1; num <= 3; num++) {
    for (let copy = 0; copy < 4; copy++) {
      tiles.push({ suit: 4, num, red: false, id: id++ });
    }
  }
  return tiles;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function sortHand(hand) {
  return hand.slice().sort((a, b) => tileSortKey(a) - tileSortKey(b));
}

// ===== HAND ANALYSIS =====
function handToCount(tiles) {
  let c = Array.from({length:5}, () => new Array(10).fill(0));
  for (const t of tiles) c[t.suit][t.num]++;
  return c;
}

function calcShanten(tiles, melds) {
  if (typeof melds === 'undefined') melds = 0;
  const c = handToCount(tiles);
  const s1 = shantenNormal(c, melds);
  const s2 = tiles.length >= 13 ? shantenChiitoi(c) : 99;
  const s3 = tiles.length >= 13 ? shantenKokushi(c) : 99;
  return Math.min(s1, s2, s3);
}

function shantenNormal(c, melds) {
  let best = 8 - melds * 2;
  function rec(s, n, mentsu, jantai, partial) {
    if (s > 4 || (s === 4 && n > 9)) {
      let sh = 8 - melds * 2 - mentsu * 2 - jantai - partial;
      if (sh < best) best = sh;
      return;
    }
    let ns = s, nn = n + 1;
    if (nn > 9) { ns = s + 1; nn = (ns >= 3) ? 1 : 1; }
    if (s >= 5) return;
    if (n > 9) { rec(s + 1, 1, mentsu, jantai, partial); return; }
    if (c[s][n] >= 2 && jantai === 0) {
      c[s][n] -= 2;
      rec(s, n, mentsu, 1, partial);
      c[s][n] += 2;
    }
    if (c[s][n] >= 3) {
      c[s][n] -= 3;
      rec(s, n, mentsu + 1, jantai, partial);
      c[s][n] += 3;
    }
    if (s <= 2 && n <= 7 && c[s][n] >= 1 && c[s][n+1] >= 1 && c[s][n+2] >= 1) {
      c[s][n]--; c[s][n+1]--; c[s][n+2]--;
      rec(s, n, mentsu + 1, jantai, partial);
      c[s][n]++; c[s][n+1]++; c[s][n+2]++;
    }
    if (c[s][n] >= 2) {
      c[s][n] -= 2;
      rec(s, n, mentsu, jantai, partial + 1);
      c[s][n] += 2;
    }
    if (s <= 2 && n <= 8 && c[s][n] >= 1 && c[s][n+1] >= 1) {
      c[s][n]--; c[s][n+1]--;
      rec(s, n, mentsu, jantai, partial + 1);
      c[s][n]++; c[s][n+1]++;
    }
    if (s <= 2 && n <= 7 && c[s][n] >= 1 && c[s][n+2] >= 1) {
      c[s][n]--; c[s][n+2]--;
      rec(s, n, mentsu, jantai, partial + 1);
      c[s][n]++; c[s][n+2]++;
    }
    rec(s, nn > 9 ? 1 : nn, mentsu, jantai, partial);
    if (nn > 9) return;
  }
  rec(0, 1, 0, 0, 0);
  return best;
}

function shantenChiitoi(c) {
  let pairs = 0, kinds = 0;
  for (let s = 0; s < 5; s++)
    for (let n = 1; n <= 9; n++) {
      if (s >= 3 && n > (s === 3 ? 4 : 3)) continue;
      if (c[s][n] >= 2) pairs++;
      if (c[s][n] >= 1) kinds++;
    }
  return 6 - pairs + Math.max(0, 7 - kinds);
}

function shantenKokushi(c) {
  const terminals = [[0,1],[0,9],[1,1],[1,9],[2,1],[2,9],[3,1],[3,2],[3,3],[3,4],[4,1],[4,2],[4,3]];
  let kinds = 0, hasPair = false;
  for (const [s,n] of terminals) {
    if (c[s][n] >= 1) kinds++;
    if (c[s][n] >= 2) hasPair = true;
  }
  return 13 - kinds - (hasPair ? 1 : 0);
}

function isComplete(tiles, melds) {
  const c = handToCount(tiles);
  if (isCompleteNormal(c, melds)) return true;
  if (melds === 0 && isCompleteChiitoi(c)) return true;
  if (melds === 0 && isCompleteKokushi(c)) return true;
  return false;
}

function isCompleteNormal(c, melds) {
  for (let s = 0; s < 5; s++)
    for (let n = 1; n <= 9; n++) {
      if (s >= 3 && n > (s === 3 ? 4 : 3)) continue;
      if (c[s][n] >= 2) {
        c[s][n] -= 2;
        if (removeMentsu(c, 4 - melds)) { c[s][n] += 2; return true; }
        c[s][n] += 2;
      }
    }
  return false;
}

function removeMentsu(c, need) {
  if (need === 0) {
    for (let s = 0; s < 5; s++)
      for (let n = 1; n <= 9; n++) if (c[s][n] !== 0) return false;
    return true;
  }
  for (let s = 0; s < 5; s++)
    for (let n = 1; n <= 9; n++) {
      if (s >= 3 && n > (s === 3 ? 4 : 3)) continue;
      if (c[s][n] >= 3) {
        c[s][n] -= 3;
        if (removeMentsu(c, need - 1)) { c[s][n] += 3; return true; }
        c[s][n] += 3;
      }
      if (s <= 2 && n <= 7 && c[s][n] >= 1 && c[s][n+1] >= 1 && c[s][n+2] >= 1) {
        c[s][n]--; c[s][n+1]--; c[s][n+2]--;
        if (removeMentsu(c, need - 1)) { c[s][n]++; c[s][n+1]++; c[s][n+2]++; return true; }
        c[s][n]++; c[s][n+1]++; c[s][n+2]++;
      }
    }
  return false;
}

function isCompleteChiitoi(c) {
  let pairs = 0;
  for (let s = 0; s < 5; s++)
    for (let n = 1; n <= 9; n++) {
      if (s >= 3 && n > (s === 3 ? 4 : 3)) continue;
      if (c[s][n] === 2) pairs++;
      else if (c[s][n] !== 0) return false;
    }
  return pairs === 7;
}

function isCompleteKokushi(c) {
  const terminals = [[0,1],[0,9],[1,1],[1,9],[2,1],[2,9],[3,1],[3,2],[3,3],[3,4],[4,1],[4,2],[4,3]];
  let total = 0, hasPair = false;
  for (const [s,n] of terminals) {
    if (c[s][n] === 0) return false;
    if (c[s][n] === 2) { if (hasPair) return false; hasPair = true; }
    total += c[s][n];
  }
  return total === 14 && hasPair;
}

function getWaitingTiles(hand, meldCount) {
  let waits = [];
  for (let s = 0; s < 5; s++) {
    let maxN = s <= 2 ? 9 : (s === 3 ? 4 : 3);
    for (let n = 1; n <= maxN; n++) {
      let t = {suit:s, num:n, red:false, id:-1};
      if (isComplete([...hand, t], meldCount)) {
        waits.push(t);
      }
    }
  }
  return waits;
}

// ===== YAKU EVALUATION =====
function evaluateYaku(tiles, melds, winTile, isTsumo, isRiichi, isIppatsu, seatWind, roundWind, isDoubleRiichi, doraList, uradoraList, isLastTile, isRinshan) {
  let yakuList = [];
  let han = 0;
  const c = handToCount(tiles);
  const isMenzen = melds.length === 0;
  const allTiles = tiles.slice();

  let decomp = decomposeHand(c, melds.length);
  let isChiitoi = isMenzen && isCompleteChiitoi(handToCount(tiles));
  let isKokushi = isMenzen && isCompleteKokushi(handToCount(tiles));

  if (isKokushi) {
    yakuList.push({name:'国士無双', han:13, isYakuman:true});
    return {yakuList, han:13, isYakuman:true};
  }

  if (isMenzen && decomp && decomp.mentsu.filter(m => m.type === 'koutsu').length === 4) {
    yakuList.push({name:'四暗刻', han:13, isYakuman:true});
    return {yakuList, han:13, isYakuman:true};
  }

  if (decomp) {
    let dragonKoutsu = 0;
    const allMentsu = [...decomp.mentsu, ...melds.map(m => ({type: m.type === 'pon' ? 'koutsu' : m.type, tiles: m.tiles}))];
    for (const m of allMentsu) {
      if ((m.type === 'koutsu' || m.type === 'kan') && m.tiles[0].suit === 4) dragonKoutsu++;
    }
    if (dragonKoutsu === 3) {
      yakuList.push({name:'大三元', han:13, isYakuman:true});
      return {yakuList, han:13, isYakuman:true};
    }
  }

  if (allTiles.every(t => t.suit >= 3)) {
    let meldOk = melds.every(m => m.tiles.every(t => t.suit >= 3));
    if (meldOk) {
      yakuList.push({name:'字一色', han:13, isYakuman:true});
      return {yakuList, han:13, isYakuman:true};
    }
  }

  if (!decomp && !isChiitoi) return {yakuList:[], han:0, isYakuman:false};

  if (isRiichi) {
    if (isDoubleRiichi) {
      yakuList.push({name:'ダブル立直', han:2}); han += 2;
    } else {
      yakuList.push({name:'立直', han:1}); han += 1;
    }
  }

  if (isIppatsu) { yakuList.push({name:'一発', han:1}); han += 1; }
  if (isMenzen && isTsumo && !isChiitoi) { yakuList.push({name:'門前清自摸和', han:1}); han += 1; }
  if (isChiitoi) { yakuList.push({name:'七対子', han:2}); han += 2; }

  if (decomp && !isChiitoi) {
    const allMentsu = [...decomp.mentsu, ...melds.map(m => ({type: m.type === 'pon' ? 'koutsu' : m.type, tiles: m.tiles}))];

    if (isMenzen) {
      let allShuntsu = allMentsu.every(m => m.type === 'shuntsu');
      let jantaiOk = true;
      if (decomp.jantai) {
        const jt = decomp.jantai;
        if (jt.suit === 4) jantaiOk = false;
        if (jt.suit === 3 && jt.num === seatWind) jantaiOk = false;
        if (jt.suit === 3 && jt.num === roundWind) jantaiOk = false;
      }
      if (allShuntsu && jantaiOk && allMentsu.length === 4) {
        yakuList.push({name:'平和', han:1}); han += 1;
      }
    }

    let allSimple = allTiles.every(t => t.suit <= 2 && t.num >= 2 && t.num <= 8);
    let meldsSimple = melds.every(m => m.tiles.every(t => t.suit <= 2 && t.num >= 2 && t.num <= 8));
    if (allSimple && meldsSimple) { yakuList.push({name:'断么九', han:1}); han += 1; }

    for (const m of allMentsu) {
      if (m.type === 'koutsu' || m.type === 'kan') {
        const t0 = m.tiles[0];
        if (t0.suit === 4) { yakuList.push({name:'役牌(' + DRAGON_NAMES[t0.num] + ')', han:1}); han += 1; }
        if (t0.suit === 3 && t0.num === seatWind) { yakuList.push({name:'役牌(自風' + WIND_NAMES[t0.num] + ')', han:1}); han += 1; }
        if (t0.suit === 3 && t0.num === roundWind && !(t0.num === seatWind && yakuList.some(y => y.name.includes('自風')))) {
          yakuList.push({name:'役牌(場風' + WIND_NAMES[t0.num] + ')', han:1}); han += 1;
        }
      }
    }

    if (isMenzen) {
      let shuntsuKeys = allMentsu.filter(m => m.type === 'shuntsu').map(m => m.tiles[0].suit * 10 + m.tiles[0].num);
      let pairs = 0;
      let used = new Array(shuntsuKeys.length).fill(false);
      for (let i = 0; i < shuntsuKeys.length; i++) {
        if (used[i]) continue;
        for (let j = i + 1; j < shuntsuKeys.length; j++) {
          if (used[j]) continue;
          if (shuntsuKeys[i] === shuntsuKeys[j]) { used[i] = used[j] = true; pairs++; break; }
        }
      }
      if (pairs === 2) { yakuList.push({name:'二盃口', han:3}); han += 3; }
      else if (pairs === 1) { yakuList.push({name:'一盃口', han:1}); han += 1; }
    }

    if (allMentsu.every(m => m.type === 'koutsu' || m.type === 'kan')) {
      yakuList.push({name:'対々和', han:2}); han += 2;
    }

    let anko = decomp.mentsu.filter(m => m.type === 'koutsu').length;
    if (anko >= 3) { yakuList.push({name:'三暗刻', han:2}); han += 2; }

    for (let s = 0; s <= 2; s++) {
      let has123 = allMentsu.some(m => m.type === 'shuntsu' && m.tiles[0].suit === s && m.tiles[0].num === 1);
      let has456 = allMentsu.some(m => m.type === 'shuntsu' && m.tiles[0].suit === s && m.tiles[0].num === 4);
      let has789 = allMentsu.some(m => m.type === 'shuntsu' && m.tiles[0].suit === s && m.tiles[0].num === 7);
      if (has123 && has456 && has789) {
        let h = isMenzen ? 2 : 1;
        yakuList.push({name:'一気通貫', han:h}); han += h; break;
      }
    }

    let mentsuWithTerminal = allMentsu.every(m => {
      if (m.type === 'shuntsu') return m.tiles[0].num === 1 || m.tiles[0].num === 7;
      return m.tiles[0].suit >= 3 || m.tiles[0].num === 1 || m.tiles[0].num === 9;
    });
    let jantaiTerminal = decomp.jantai && (decomp.jantai.suit >= 3 || decomp.jantai.num === 1 || decomp.jantai.num === 9);
    if (mentsuWithTerminal && jantaiTerminal && allMentsu.some(m => m.tiles[0].suit >= 3)) {
      let h = isMenzen ? 2 : 1;
      yakuList.push({name:'混全帯么九', han:h}); han += h;
    }

    for (let n = 1; n <= 7; n++) {
      let suits = [0,1,2].map(s => allMentsu.some(m => m.type === 'shuntsu' && m.tiles[0].suit === s && m.tiles[0].num === n));
      if (suits.every(x => x)) {
        let h = isMenzen ? 2 : 1;
        yakuList.push({name:'三色同順', han:h}); han += h; break;
      }
    }

    let numSuits = new Set();
    let hasJi = false;
    for (const t of [...allTiles, ...melds.flatMap(m => m.tiles)]) {
      if (t.suit <= 2) numSuits.add(t.suit);
      else hasJi = true;
    }
    if (numSuits.size === 1 && hasJi) {
      let h = isMenzen ? 3 : 2;
      yakuList.push({name:'混一色', han:h}); han += h;
    }
    if (numSuits.size === 1 && !hasJi) {
      let h = isMenzen ? 6 : 5;
      yakuList.push({name:'清一色', han:h}); han += h;
    }

    {
      let dragonK = 0, dragonJ = false;
      for (const m of allMentsu) {
        if ((m.type === 'koutsu' || m.type === 'kan') && m.tiles[0].suit === 4) dragonK++;
      }
      if (decomp.jantai && decomp.jantai.suit === 4) dragonJ = true;
      if (dragonK === 2 && dragonJ) { yakuList.push({name:'小三元', han:2}); han += 2; }
    }
  }

  if (isLastTile) {
    if (isTsumo) { yakuList.push({name:'海底摸月', han:1}); han += 1; }
    else { yakuList.push({name:'河底撈魚', han:1}); han += 1; }
  }

  if (isRinshan) { yakuList.push({name:'嶺上開花', han:1}); han += 1; }

  let doraCount = 0;
  const allTilesWithMelds = [...allTiles, ...melds.flatMap(m => m.tiles)];
  for (const t of allTilesWithMelds) {
    if (t.red) doraCount++;
    for (const d of doraList) {
      if (t.suit === d.suit && t.num === d.num) doraCount++;
    }
  }
  if (doraCount > 0) { yakuList.push({name:'ドラ', han:doraCount}); han += doraCount; }

  if (isRiichi && uradoraList) {
    let uraCount = 0;
    for (const t of allTilesWithMelds) {
      for (const d of uradoraList) {
        if (t.suit === d.suit && t.num === d.num) uraCount++;
      }
    }
    if (uraCount > 0) { yakuList.push({name:'裏ドラ', han:uraCount}); han += uraCount; }
  }

  return {yakuList, han, isYakuman: false};
}

function decomposeHand(c, meldCount) {
  let result = null;
  for (let s = 0; s < 5; s++)
    for (let n = 1; n <= 9; n++) {
      if (s >= 3 && n > (s === 3 ? 4 : 3)) continue;
      if (c[s][n] >= 2) {
        c[s][n] -= 2;
        let mentsu = findMentsu(c, 4 - meldCount);
        if (mentsu) { c[s][n] += 2; return { jantai: {suit:s, num:n}, mentsu }; }
        c[s][n] += 2;
      }
    }
  return null;
}

function findMentsu(c, need) {
  if (need === 0) {
    for (let s = 0; s < 5; s++)
      for (let n = 1; n <= 9; n++) if (c[s][n] !== 0) return null;
    return [];
  }
  for (let s = 0; s < 5; s++)
    for (let n = 1; n <= 9; n++) {
      if (s >= 3 && n > (s === 3 ? 4 : 3)) continue;
      if (c[s][n] > 0) {
        if (c[s][n] >= 3) {
          c[s][n] -= 3;
          let rest = findMentsu(c, need - 1);
          if (rest !== null) { c[s][n] += 3; return [{type:'koutsu', tiles:[{suit:s,num:n},{suit:s,num:n},{suit:s,num:n}]}, ...rest]; }
          c[s][n] += 3;
        }
        if (s <= 2 && n <= 7 && c[s][n+1] > 0 && c[s][n+2] > 0) {
          c[s][n]--; c[s][n+1]--; c[s][n+2]--;
          let rest = findMentsu(c, need - 1);
          if (rest !== null) { c[s][n]++; c[s][n+1]++; c[s][n+2]++; return [{type:'shuntsu', tiles:[{suit:s,num:n},{suit:s,num:n+1},{suit:s,num:n+2}]}, ...rest]; }
          c[s][n]++; c[s][n+1]++; c[s][n+2]++;
        }
        return null;
      }
    }
  return [];
}

function doraFromIndicator(t) {
  if (t.suit <= 2) return {suit: t.suit, num: t.num === 9 ? 1 : t.num + 1};
  if (t.suit === 3) return {suit: 3, num: t.num === 4 ? 1 : t.num + 1};
  if (t.suit === 4) return {suit: 4, num: t.num === 3 ? 1 : t.num + 1};
  return t;
}

// ===== SCORE CALCULATION =====
function calcFu(decomp, melds, isTsumo, isMenzen, seatWind, roundWind, isChiitoi) {
  if (isChiitoi) return 25;
  let fu = 30;
  if (!isMenzen && !isTsumo) fu = 30;
  if (isTsumo && isMenzen) {
    if (decomp) {
      const allMentsu = [...decomp.mentsu, ...melds.map(m => ({type: m.type === 'pon' ? 'koutsu' : m.type, tiles: m.tiles}))];
      let allShuntsu = allMentsu.every(m => m.type === 'shuntsu');
      if (allShuntsu) return 20;
    }
  }
  if (isTsumo) fu += 2;
  if (isMenzen && !isTsumo) fu = 30;
  if (!decomp) return fu;

  const allMentsu = [...decomp.mentsu, ...melds.map(m => ({type: m.type === 'pon' ? 'koutsu' : m.type, tiles: m.tiles}))];
  for (const m of allMentsu) {
    if (m.type === 'koutsu') {
      let base = 4;
      const t0 = m.tiles[0];
      if (t0.suit >= 3 || t0.num === 1 || t0.num === 9) base = 8;
      if (decomp.mentsu.includes(m)) base *= 1;
      else base = Math.floor(base / 2);
      fu += base;
    }
    if (m.type === 'kan') {
      let base = 16;
      const t0 = m.tiles[0];
      if (t0.suit >= 3 || t0.num === 1 || t0.num === 9) base = 32;
      let isAnkan = melds.some(ml => ml.type === 'ankan' && ml.tiles[0] && tilesEqual(ml.tiles[0], t0));
      if (!isAnkan) base = Math.floor(base / 2);
      fu += base;
    }
  }
  if (decomp.jantai) {
    const j = decomp.jantai;
    if (j.suit === 4) fu += 2;
    if (j.suit === 3 && j.num === seatWind) fu += 2;
    if (j.suit === 3 && j.num === roundWind) fu += 2;
  }
  fu = Math.ceil(fu / 10) * 10;
  return fu;
}

function calcScore(han, fu, isDealer, isTsumo, isYakuman) {
  if (isYakuman) {
    if (isDealer) {
      if (isTsumo) return {total: 48000, each: 16000};
      return {total: 48000, each: 0};
    }
    if (isTsumo) return {total: 32000, eachKo: 8000, eachOya: 16000};
    return {total: 32000, each: 0};
  }
  let base;
  if (han >= 13) base = 8000;
  else if (han >= 11) base = 6000;
  else if (han >= 8) base = 4000;
  else if (han >= 6) base = 3000;
  else if (han >= 5 || (han === 4 && fu >= 30) || (han === 3 && fu >= 70)) base = 2000;
  else base = fu * Math.pow(2, han + 2);
  if (base > 2000) base = 2000;

  if (isDealer) {
    if (isTsumo) { let each = Math.ceil(base * 2 / 100) * 100; return {total: each * 3, each}; }
    let total = Math.ceil(base * 6 / 100) * 100;
    return {total, each: 0};
  } else {
    if (isTsumo) {
      let eachKo = Math.ceil(base / 100) * 100;
      let eachOya = Math.ceil(base * 2 / 100) * 100;
      return {total: eachKo * 2 + eachOya, eachKo, eachOya};
    }
    let total = Math.ceil(base * 4 / 100) * 100;
    return {total, each: 0};
  }
}

function scoreName(han, isYakuman) {
  if (isYakuman) return '役満';
  if (han >= 13) return '数え役満';
  if (han >= 11) return '三倍満';
  if (han >= 8) return '倍満';
  if (han >= 6) return '跳満';
  if (han >= 5) return '満貫';
  return '';
}

// ===== CHI / PON / KAN LOGIC =====
function findChiCombinations(playerIdx, tile) {
  if (tile.suit > 2) return [];
  const p = G.players[playerIdx];
  let combos = [];
  const hand = p.hand;
  if (tile.num >= 3) {
    let t1 = hand.find(h => h.suit === tile.suit && h.num === tile.num - 2);
    let t2 = hand.find(h => h.suit === tile.suit && h.num === tile.num - 1 && (!t1 || h.id !== t1.id));
    if (t1 && t2) combos.push([t1, t2, tile]);
  }
  if (tile.num >= 2 && tile.num <= 8) {
    let t1 = hand.find(h => h.suit === tile.suit && h.num === tile.num - 1);
    let t2 = hand.find(h => h.suit === tile.suit && h.num === tile.num + 1 && (!t1 || h.id !== t1.id));
    if (t1 && t2) combos.push([t1, t2, tile]);
  }
  if (tile.num <= 7) {
    let t1 = hand.find(h => h.suit === tile.suit && h.num === tile.num + 1);
    let t2 = hand.find(h => h.suit === tile.suit && h.num === tile.num + 2 && (!t1 || h.id !== t1.id));
    if (t1 && t2) combos.push([t1, t2, tile]);
  }
  return combos;
}

function executeChi(playerIdx, combo, tile, fromPlayer) {
  let p = G.players[playerIdx];
  for (const ct of combo) {
    if (ct.id === tile.id) continue;
    let idx = p.hand.findIndex(h => h.id === ct.id);
    if (idx >= 0) p.hand.splice(idx, 1);
  }
  let meldTiles = combo.slice().sort((a,b) => a.num - b.num);
  p.melds.push({type:'chi', tiles: meldTiles, from: fromPlayer, calledTile: tile});
  let lastDiscIdx = G.players[fromPlayer].discards.length - 1;
  if (lastDiscIdx >= 0) G.players[fromPlayer].discards[lastDiscIdx].called = true;
  for (let i = 0; i < 4; i++) G.players[i].isIppatsu = false;
  playDahaiSound();
}

function findAnkanTiles(playerIdx) {
  const p = G.players[playerIdx];
  let counts = {};
  for (const t of p.hand) {
    let k = tileKey(t);
    if (!counts[k]) counts[k] = [];
    counts[k].push(t);
  }
  let result = [];
  for (const k in counts) {
    if (counts[k].length === 4) result.push(counts[k]);
  }
  return result;
}

function canDaiminkan(playerIdx, tile) {
  const p = G.players[playerIdx];
  return p.hand.filter(t => tilesEqual(t, tile)).length >= 3;
}

function findKakanTiles(playerIdx) {
  const p = G.players[playerIdx];
  let result = [];
  for (const m of p.melds) {
    if (m.type === 'pon') {
      let addTile = p.hand.find(t => tilesEqual(t, m.tiles[0]));
      if (addTile) result.push({meld: m, tile: addTile});
    }
  }
  return result;
}

function executeAnkan(playerIdx, kanTiles) {
  let p = G.players[playerIdx];
  for (const kt of kanTiles) {
    let idx = p.hand.findIndex(h => h.id === kt.id);
    if (idx >= 0) p.hand.splice(idx, 1);
  }
  p.melds.push({type:'ankan', tiles: kanTiles, from: -1});
  if (G.doraIndicators.length < 5 && G.deadWall.length > G.doraIndicators.length * 2) {
    G.doraIndicators.push(G.deadWall[G.doraIndicators.length * 2]);
  }
  for (let i = 0; i < 4; i++) G.players[i].isIppatsu = false;
  playDahaiSound();
}

function executeDaiminkan(playerIdx, tile, fromPlayer) {
  let p = G.players[playerIdx];
  let meldTiles = [tile];
  let removed = 0;
  p.hand = p.hand.filter(t => {
    if (removed < 3 && tilesEqual(t, tile)) { meldTiles.push(t); removed++; return false; }
    return true;
  });
  p.melds.push({type:'daiminkan', tiles: meldTiles, from: fromPlayer});
  let lastDiscIdx = G.players[fromPlayer].discards.length - 1;
  if (lastDiscIdx >= 0) G.players[fromPlayer].discards[lastDiscIdx].called = true;
  if (G.doraIndicators.length < 5 && G.deadWall.length > G.doraIndicators.length * 2) {
    G.doraIndicators.push(G.deadWall[G.doraIndicators.length * 2]);
  }
  for (let i = 0; i < 4; i++) G.players[i].isIppatsu = false;
  playDahaiSound();
}

function executeKakan(playerIdx, kakanInfo) {
  let p = G.players[playerIdx];
  let idx = p.hand.findIndex(h => h.id === kakanInfo.tile.id);
  if (idx >= 0) p.hand.splice(idx, 1);
  kakanInfo.meld.type = 'kakan';
  kakanInfo.meld.tiles.push(kakanInfo.tile);
  if (G.doraIndicators.length < 5 && G.deadWall.length > G.doraIndicators.length * 2) {
    G.doraIndicators.push(G.deadWall[G.doraIndicators.length * 2]);
  }
  for (let i = 0; i < 4; i++) G.players[i].isIppatsu = false;
  playDahaiSound();
}

function drawFromDeadWall() {
  let rinshanIdx = 4 + (G.doraIndicators.length - 1);
  if (rinshanIdx < G.deadWall.length) return G.deadWall[rinshanIdx];
  return drawTile();
}

function executePon(playerIdx, tile, fromPlayer) {
  let p = G.players[playerIdx];
  let meldTiles = [tile];
  let removed = 0;
  p.hand = p.hand.filter(t => {
    if (removed < 2 && tilesEqual(t, tile)) { meldTiles.push(t); removed++; return false; }
    return true;
  });
  p.melds.push({type:'pon', tiles: meldTiles, from: fromPlayer});
  let lastDiscIdx = G.players[fromPlayer].discards.length - 1;
  if (lastDiscIdx >= 0) G.players[fromPlayer].discards[lastDiscIdx].called = true;
  for (let i = 0; i < 4; i++) G.players[i].isIppatsu = false;
  playDahaiSound();
}

// ===== GAME STATE =====
let G = {};
let timerInterval = null;
let timerStart = 0;
const TURN_TIME = 20000;

function initGame() {
  G = {
    wall: [], wallPos: 0, deadWall: [], doraIndicators: [],
    players: [
      {name:'あなた', score:25000, hand:[], discards:[], melds:[], isRiichi:false, riichiTurn:-1, isIppatsu:false, isDoubleRiichi:false, seatWind:1},
      {name:'AI-A', score:25000, hand:[], discards:[], melds:[], isRiichi:false, riichiTurn:-1, isIppatsu:false, isDoubleRiichi:false, seatWind:2},
      {name:'AI-B', score:25000, hand:[], discards:[], melds:[], isRiichi:false, riichiTurn:-1, isIppatsu:false, isDoubleRiichi:false, seatWind:3},
      {name:'AI-C', score:25000, hand:[], discards:[], melds:[], isRiichi:false, riichiTurn:-1, isIppatsu:false, isDoubleRiichi:false, seatWind:4}
    ],
    currentPlayer: 0, roundWind: 1, roundNum: 1, honba: 0, kyotaku: 0,
    turnCount: 0, gamePhase: 'idle', selectedTile: -1,
    tsumoTile: null, lastDiscard: null, lastDiscardPlayer: -1,
    waitingForInput: false, dealer: 0, totalRounds: 4,
    discardMeta: [[], [], [], []],
  };
}

function startTimer() {
  clearInterval(timerInterval);
  timerStart = Date.now();
  const bar = document.getElementById('timer-progress');
  bar.style.width = '100%';
  bar.classList.remove('warning');
  timerInterval = setInterval(() => {
    const elapsed = Date.now() - timerStart;
    const remaining = Math.max(0, TURN_TIME - elapsed);
    const pct = (remaining / TURN_TIME) * 100;
    bar.style.width = pct + '%';
    if (pct < 30) bar.classList.add('warning');
    else bar.classList.remove('warning');
    if (remaining <= 0) clearInterval(timerInterval);
  }, 100);
}

function stopTimer() {
  clearInterval(timerInterval);
  const bar = document.getElementById('timer-progress');
  bar.style.width = '100%';
  bar.classList.remove('warning');
}

function startRound() {
  G.wall = shuffle(createAllTiles());
  G.wallPos = 0;
  G.deadWall = [];
  for (let i = 0; i < 14; i++) G.deadWall.push(G.wall[G.wallPos++]);
  G.doraIndicators = [G.deadWall[0]];

  for (let p = 0; p < 4; p++) {
    G.players[p].hand = [];
    G.players[p].discards = [];
    G.players[p].melds = [];
    G.players[p].isRiichi = false;
    G.players[p].riichiTurn = -1;
    G.players[p].isIppatsu = false;
    G.players[p].isDoubleRiichi = false;
    G.discardMeta[p] = [];
    for (let i = 0; i < 13; i++) G.players[p].hand.push(G.wall[G.wallPos++]);
    G.players[p].hand = sortHand(G.players[p].hand);
  }

  for (let p = 0; p < 4; p++) G.players[p].seatWind = ((p - G.dealer + 4) % 4) + 1;

  G.currentPlayer = G.dealer;
  G.turnCount = 0;
  G.tsumoTile = null;
  G.lastDiscard = null;
  G.lastDiscardPlayer = -1;
  G.gamePhase = 'draw';

  document.querySelectorAll('.riichi-line').forEach(el => el.classList.remove('active'));
  ['opp-riichi','left-riichi','right-riichi'].forEach(id => document.getElementById(id).classList.add('hidden'));

  renderAll();
  gameLoop();
}

function drawTile(player) {
  if (G.wallPos >= G.wall.length) return null;
  return G.wall[G.wallPos++];
}

function remainingTiles() { return G.wall.length - G.wallPos; }

// ===== AI LOGIC =====
function aiChooseDiscard(playerIdx) {
  const p = G.players[playerIdx];
  const hand = p.hand.slice();
  if (p.isRiichi) return hand.length - 1;

  let bestIdx = 0, bestShanten = 99;
  for (let i = 0; i < hand.length; i++) {
    let testHand = hand.filter((_, j) => j !== i);
    let sh = calcShanten(testHand, p.melds.length);
    if (sh < bestShanten) { bestShanten = sh; bestIdx = i; }
    else if (sh === bestShanten) {
      if (tileDefensiveScore(hand[i], playerIdx) > tileDefensiveScore(hand[bestIdx], playerIdx)) bestIdx = i;
    }
  }
  return bestIdx;
}

function tileDefensiveScore(t, playerIdx) {
  let score = 0;
  if (t.suit >= 3) score += 5;
  if (t.suit <= 2 && (t.num === 1 || t.num === 9)) score += 3;
  for (let p = 0; p < 4; p++) {
    if (p === playerIdx) continue;
    if (G.players[p].isRiichi) {
      if (G.players[p].discards.some(d => tilesEqual(d, t))) score += 20;
    }
  }
  return score;
}

function aiShouldRiichi(playerIdx) {
  const p = G.players[playerIdx];
  if (p.isRiichi || p.melds.length > 0 || p.score < 1000) return false;
  for (let i = 0; i < p.hand.length; i++) {
    let testHand = p.hand.filter((_, j) => j !== i);
    if (calcShanten(testHand, 0) === 0) {
      for (let s = 0; s < 5; s++)
        for (let n = 1; n <= (s >= 3 ? (s === 3 ? 4 : 3) : 9); n++) {
          let t = {suit:s, num:n, red:false, id:-1};
          if (isComplete([...testHand, t], 0)) return true;
        }
    }
  }
  return false;
}

function aiShouldPon(playerIdx, tile) {
  const p = G.players[playerIdx];
  if (p.isRiichi) return false;
  let count = p.hand.filter(t => tilesEqual(t, tile)).length;
  if (count < 2) return false;
  if (tile.suit === 4) return true;
  if (tile.suit === 3 && tile.num === p.seatWind) return true;
  if (tile.suit === 3 && tile.num === G.roundWind) return true;
  let currentShanten = calcShanten(p.hand, p.melds.length);
  let removed = 0;
  let afterHand = p.hand.filter(t => { if (removed < 2 && tilesEqual(t, tile)) { removed++; return false; } return true; });
  return calcShanten(afterHand, p.melds.length + 1) < currentShanten;
}

function aiShouldChi(playerIdx, tile) {
  const p = G.players[playerIdx];
  if (p.isRiichi || tile.suit > 2) return false;
  let combos = findChiCombinations(playerIdx, tile);
  if (combos.length === 0) return false;
  let currentShanten = calcShanten(p.hand, p.melds.length);
  for (const combo of combos) {
    let afterHand = p.hand.slice();
    for (const ct of combo) {
      if (ct.id === tile.id) continue;
      let idx = afterHand.findIndex(h => h.id === ct.id);
      if (idx >= 0) afterHand.splice(idx, 1);
    }
    if (calcShanten(afterHand, p.melds.length + 1) < currentShanten) return combos[0];
  }
  return false;
}

function aiShouldDaiminkan(playerIdx, tile) {
  const p = G.players[playerIdx];
  if (p.isRiichi) return false;
  return canDaiminkan(playerIdx, tile);
}

function canRon(playerIdx, tile) {
  const p = G.players[playerIdx];
  let testHand = [...p.hand, tile];
  if (!isComplete(testHand, p.melds.length)) return false;
  let eval_ = evaluateYaku(testHand, p.melds, tile, false, p.isRiichi, p.isIppatsu,
    p.seatWind, G.roundWind, p.isDoubleRiichi,
    G.doraIndicators.map(d => doraFromIndicator(d)), null, false, false);
  return eval_.yakuList.length > 0;
}

function canTsumo(playerIdx) {
  const p = G.players[playerIdx];
  if (!isComplete(p.hand, p.melds.length)) return false;
  let eval_ = evaluateYaku(p.hand, p.melds, G.tsumoTile, true, p.isRiichi, p.isIppatsu,
    p.seatWind, G.roundWind, p.isDoubleRiichi,
    G.doraIndicators.map(d => doraFromIndicator(d)),
    p.isRiichi ? [doraFromIndicator(G.deadWall[1])] : null,
    remainingTiles() === 0, false);
  return eval_.yakuList.length > 0;
}

// ===== GAME LOOP =====
async function gameLoop() {
  try {
    while (G.gamePhase !== 'end' && G.gamePhase !== 'idle') {
      if (G.gamePhase === 'draw') {
        if (!(await handleDraw())) return;
      } else if (G.gamePhase === 'discard') { return; }
      else if (G.gamePhase === 'call') {
        if (!(await handleCallPhase())) return;
      } else if (G.gamePhase === 'agari' || G.gamePhase === 'ryuukyoku') { return; }
      else break;
    }
  } catch(e) { console.error('gameLoop error:', e); }
}

async function handleDraw() {
  if (remainingTiles() === 0) { await handleRyuukyoku(); return false; }

  let p = G.players[G.currentPlayer];
  let tile = drawTile(G.currentPlayer);
  G.tsumoTile = tile;
  p.hand.push(tile);
  G.turnCount++;

  if (G.currentPlayer === 0) playTsumoSound();

  for (let i = 0; i < 4; i++) {
    if (G.players[i].isIppatsu && G.turnCount - G.players[i].riichiTurn > 4) G.players[i].isIppatsu = false;
  }

  renderAll();

  if (canTsumo(G.currentPlayer)) {
    if (G.currentPlayer === 0) {
      G.gamePhase = 'discard';
      showPlayerTsumoOption();
      startTimer();
      return false;
    } else {
      await delay(getAiDelay() * 0.75);
      await handleAgari(G.currentPlayer, G.currentPlayer, true);
      return false;
    }
  }

  if (G.currentPlayer === 0) {
    G.gamePhase = 'discard';
    G.waitingForInput = true;
    showPlayerActions();
    startTimer();
    renderAll();
    return false;
  }

  await delay(getAiDelay());

  // AI ankan
  let ankanTiles = findAnkanTiles(G.currentPlayer);
  if (ankanTiles.length > 0 && !p.isRiichi) {
    executeAnkan(G.currentPlayer, ankanTiles[0]);
    renderAll();
    await delay(getAiDelay() * 0.75);
    let rinshanTile = drawFromDeadWall();
    if (rinshanTile) {
      G.tsumoTile = rinshanTile;
      p.hand.push(rinshanTile);
      if (canTsumo(G.currentPlayer)) { await delay(getAiDelay() * 0.75); await handleAgari(G.currentPlayer, G.currentPlayer, true); return false; }
    }
    renderAll();
  }

  // AI kakan
  let kakanTiles = findKakanTiles(G.currentPlayer);
  if (kakanTiles.length > 0 && !p.isRiichi) {
    executeKakan(G.currentPlayer, kakanTiles[0]);
    renderAll();
    await delay(getAiDelay() * 0.75);
    let rinshanTile = drawFromDeadWall();
    if (rinshanTile) {
      G.tsumoTile = rinshanTile;
      p.hand.push(rinshanTile);
      if (canTsumo(G.currentPlayer)) { await delay(getAiDelay() * 0.75); await handleAgari(G.currentPlayer, G.currentPlayer, true); return false; }
    }
    renderAll();
  }

  // AI riichi
  if (aiShouldRiichi(G.currentPlayer)) {
    p.isRiichi = true;
    p.riichiTurn = G.turnCount;
    p.isIppatsu = true;
    p.score -= 1000;
    G.kyotaku++;
    showRiichiLine(G.currentPlayer);
    showRiichiMark(G.currentPlayer);
    playRiichiSound();
    await delay(getAiDelay() * 0.75);
  }

  let discIdx = aiChooseDiscard(G.currentPlayer);
  let discTile = p.hand.splice(discIdx, 1)[0];
  let isTsumogiri = G.tsumoTile && discTile.id === G.tsumoTile.id;
  p.hand = sortHand(p.hand);
  p.discards.push(discTile);
  G.discardMeta[G.currentPlayer].push({isTsumogiri});
  G.lastDiscard = discTile;
  G.lastDiscardPlayer = G.currentPlayer;

  playDahaiSound();
  renderAll();

  G.gamePhase = 'call';
  return true;
}

async function handleCallPhase() {
  let tile = G.lastDiscard;
  let fromPlayer = G.lastDiscardPlayer;

  // Check ron
  let ronPlayers = [];
  for (let i = 0; i < 4; i++) {
    if (i === fromPlayer) continue;
    if (canRon(i, tile)) ronPlayers.push(i);
  }

  if (ronPlayers.length > 0) {
    if (ronPlayers.includes(0)) {
      G.waitingForInput = true;
      showRonOption(tile, fromPlayer);
      startTimer();
      return false;
    }
    let ronner = ronPlayers[0];
    await delay(getAiDelay() * 0.75);
    G.players[ronner].hand.push(tile);
    await handleAgari(ronner, fromPlayer, false);
    return false;
  }

  // Check pon/kan for player
  if (fromPlayer !== 0) {
    let p = G.players[0];
    let ponCount = p.hand.filter(t => tilesEqual(t, tile)).length;
    if (ponCount >= 3 && !p.isRiichi) {
      G.waitingForInput = true;
      showDaiminkanOption(tile, fromPlayer);
      startTimer();
      return false;
    }
    if (ponCount >= 2 && !p.isRiichi) {
      G.waitingForInput = true;
      showPonOption(tile, fromPlayer);
      startTimer();
      return false;
    }
  }

  // AI pon/kan
  for (let i = 1; i < 4; i++) {
    if (i === fromPlayer) continue;
    if (aiShouldDaiminkan(i, tile) && !G.players[i].isRiichi) {
      await delay(getAiDelay() * 0.75);
      executeDaiminkan(i, tile, fromPlayer);
      renderAll();
      await delay(getAiDelay() * 0.75);
      G.currentPlayer = i;
      let rinshanTile = drawFromDeadWall();
      if (rinshanTile) {
        G.tsumoTile = rinshanTile;
        G.players[i].hand.push(rinshanTile);
        if (canTsumo(i)) { await delay(getAiDelay() * 0.75); await handleAgari(i, i, true); return false; }
      }
      let discIdx = aiChooseDiscard(i);
      let discTile = G.players[i].hand.splice(discIdx, 1)[0];
      G.players[i].hand = sortHand(G.players[i].hand);
      G.players[i].discards.push(discTile);
      G.discardMeta[i].push({isTsumogiri: false});
      G.lastDiscard = discTile;
      G.lastDiscardPlayer = i;
      playDahaiSound();
      renderAll();
      G.gamePhase = 'call';
      return true;
    }
    if (aiShouldPon(i, tile)) {
      await delay(getAiDelay() * 0.75);
      executePon(i, tile, fromPlayer);
      renderAll();
      await delay(getAiDelay() * 0.75);
      G.currentPlayer = i;
      let discIdx = aiChooseDiscard(i);
      let discTile = G.players[i].hand.splice(discIdx, 1)[0];
      G.players[i].hand = sortHand(G.players[i].hand);
      G.players[i].discards.push(discTile);
      G.discardMeta[i].push({isTsumogiri: false});
      G.lastDiscard = discTile;
      G.lastDiscardPlayer = i;
      playDahaiSound();
      renderAll();
      G.gamePhase = 'call';
      return true;
    }
  }

  // Chi for player
  let kamicha = (0 + 4 - 1) % 4;
  if (fromPlayer === kamicha && !G.players[0].isRiichi) {
    let combos = findChiCombinations(0, tile);
    if (combos.length > 0) {
      G.waitingForInput = true;
      showChiOption(tile, fromPlayer, combos);
      startTimer();
      return false;
    }
  }

  // AI chi
  for (let i = 1; i < 4; i++) {
    let aiKamicha = (i + 4 - 1) % 4;
    if (fromPlayer === aiKamicha) {
      let chiResult = aiShouldChi(i, tile);
      if (chiResult) {
        await delay(getAiDelay() * 0.75);
        executeChi(i, chiResult, tile, fromPlayer);
        renderAll();
        await delay(getAiDelay() * 0.75);
        G.currentPlayer = i;
        let discIdx = aiChooseDiscard(i);
        let discTile = G.players[i].hand.splice(discIdx, 1)[0];
        G.players[i].hand = sortHand(G.players[i].hand);
        G.players[i].discards.push(discTile);
        G.discardMeta[i].push({isTsumogiri: false});
        G.lastDiscard = discTile;
        G.lastDiscardPlayer = i;
        playDahaiSound();
        renderAll();
        G.gamePhase = 'call';
        return true;
      }
    }
  }

  G.currentPlayer = (G.currentPlayer + 1) % 4;
  G.gamePhase = 'draw';
  return true;
}

async function handleAgari(winner, fromPlayer, isTsumo) {
  G.gamePhase = 'agari';
  stopTimer();
  playAgariSound();
  let p = G.players[winner];
  let winTile = isTsumo ? G.tsumoTile : G.lastDiscard;

  let doraList = G.doraIndicators.map(d => doraFromIndicator(d));
  let uradoraList = p.isRiichi ? [doraFromIndicator(G.deadWall[1])] : null;

  let eval_ = evaluateYaku(p.hand, p.melds, winTile, isTsumo, p.isRiichi, p.isIppatsu,
    p.seatWind, G.roundWind, p.isDoubleRiichi, doraList, uradoraList,
    remainingTiles() === 0, false);

  let isChiitoi = p.melds.length === 0 && isCompleteChiitoi(handToCount(p.hand));
  let decomp = decomposeHand(handToCount(p.hand.filter(t => t.id !== (isTsumo && G.tsumoTile ? G.tsumoTile.id : -999))), p.melds.length);

  let fu = calcFu(decomp, p.melds, isTsumo, p.melds.length === 0, p.seatWind, G.roundWind, isChiitoi);
  let isDealer = p.seatWind === 1;
  let score = calcScore(eval_.han, fu, isDealer, isTsumo, eval_.isYakuman);

  let honbaBonus = G.honba * 300;
  score.total += honbaBonus;

  showAgariOverlay(winner, fromPlayer, isTsumo, p.hand, p.melds, eval_, fu, score);
}

function showAgariOverlay(winner, fromPlayer, isTsumo, hand, melds, eval_, fu, score) {
  const overlay = document.getElementById('agari-overlay');
  overlay.classList.remove('hidden', 'tier-normal', 'tier-mangan', 'tier-yakuman');

  let tier = 'normal';
  if (eval_.isYakuman) tier = 'yakuman';
  else if (eval_.han >= 5) tier = 'mangan';

  if (Settings.effectsEnabled) {
    overlay.classList.add('tier-' + tier);
  }

  let showDelay = Settings.effectsEnabled ? (tier === 'yakuman' ? 800 : (tier === 'mangan' ? 400 : 100)) : 50;
  setTimeout(() => overlay.classList.add('show'), showDelay);

  const typeEl = document.getElementById('agari-type');
  let typeText = isTsumo ? 'ツモ' : 'ロン';
  if (tier === 'yakuman') typeText = scoreName(eval_.han, eval_.isYakuman);
  else if (tier === 'mangan') typeText = scoreName(eval_.han, false) + ' ' + typeText;
  typeEl.textContent = typeText;

  const handEl = document.getElementById('agari-hand');
  handEl.innerHTML = '';
  for (const m of melds) {
    for (const t of m.tiles) {
      let div = createTileElement(t, false, true);
      div.style.width = '32px'; div.style.height = '44px'; div.style.fontSize = '13px';
      handEl.appendChild(div);
    }
    let spacer = document.createElement('div');
    spacer.style.width = '8px';
    handEl.appendChild(spacer);
  }
  let sortedHand = sortHand(hand);
  for (const t of sortedHand) {
    let div = createTileElement(t, false, true);
    div.style.width = '36px'; div.style.height = '50px'; div.style.fontSize = '15px';
    handEl.appendChild(div);
  }

  const yakuEl = document.getElementById('yaku-list');
  yakuEl.innerHTML = '';
  for (const y of eval_.yakuList) {
    let row = document.createElement('div');
    row.className = 'yaku-row';
    row.setAttribute('role', 'listitem');
    row.innerHTML = `<span class="yn">${y.name}</span><span class="yh">${y.isYakuman ? '役満' : y.han + '翻'}</span>`;
    yakuEl.appendChild(row);
  }
  let sn = scoreName(eval_.han, eval_.isYakuman);
  let totalRow = document.createElement('div');
  totalRow.className = 'yaku-total';
  totalRow.innerHTML = `<span class="yn">${sn ? sn + ' ' : ''}${fu}符${eval_.han}翻</span><span class="yh">${score.total}点</span>`;
  yakuEl.appendChild(totalRow);

  if (tier === 'yakuman' && Settings.effectsEnabled) startGoldParticles();

  G.agariData = {winner, fromPlayer, isTsumo, score, eval_};
}

let particleAnimId = null;
function startGoldParticles() {
  const canvas = document.getElementById('agari-particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let particles = [];
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * canvas.width, y: -Math.random() * canvas.height,
      size: Math.random() * 4 + 1, speedY: Math.random() * 1.5 + 0.5,
      speedX: (Math.random() - 0.5) * 0.8,
      opacity: Math.random() * 0.8 + 0.2, hue: Math.random() * 30 + 35,
    });
  }
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of particles) {
      p.y += p.speedY; p.x += p.speedX;
      if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 70%, 60%, ${p.opacity})`; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 70%, 60%, ${p.opacity * 0.2})`; ctx.fill();
    }
    particleAnimId = requestAnimationFrame(animate);
  }
  animate();
}

function stopGoldParticles() {
  if (particleAnimId) { cancelAnimationFrame(particleAnimId); particleAnimId = null; }
  const canvas = document.getElementById('agari-particles');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function nextAfterAgari() {
  const {winner, fromPlayer, isTsumo, score} = G.agariData;

  if (isTsumo) {
    let isDealer = G.players[winner].seatWind === 1;
    for (let i = 0; i < 4; i++) {
      if (i === winner) { G.players[i].score += score.total + G.kyotaku * 1000; }
      else {
        if (isDealer) G.players[i].score -= score.each;
        else G.players[i].score -= (G.players[i].seatWind === 1 ? score.eachOya : score.eachKo);
      }
    }
  } else {
    G.players[winner].score += score.total + G.kyotaku * 1000;
    G.players[fromPlayer].score -= score.total;
  }

  G.kyotaku = 0;
  stopGoldParticles();

  const overlay = document.getElementById('agari-overlay');
  overlay.classList.remove('show');
  setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('tier-normal', 'tier-mangan', 'tier-yakuman'); }, 500);

  let dealerWon = G.players[winner].seatWind === 1;
  if (dealerWon) { G.honba++; }
  else { G.honba = 0; G.roundNum++; G.dealer = (G.dealer + 1) % 4; }

  if (G.roundNum > G.totalRounds) { showFinalResult(); return; }
  for (let i = 0; i < 4; i++) { if (G.players[i].score < 0) { showFinalResult(); return; } }

  setTimeout(() => startRound(), 600);
}

async function handleRyuukyoku() {
  G.gamePhase = 'ryuukyoku';
  stopTimer();

  let tenpai = [];
  for (let i = 0; i < 4; i++) tenpai.push(calcShanten(G.players[i].hand, G.players[i].melds.length) === 0);

  let tenpaiCount = tenpai.filter(x => x).length;
  if (tenpaiCount > 0 && tenpaiCount < 4) {
    if (tenpaiCount === 1) { for (let i = 0; i < 4; i++) G.players[i].score += tenpai[i] ? 3000 : -1000; }
    else if (tenpaiCount === 2) { for (let i = 0; i < 4; i++) G.players[i].score += tenpai[i] ? 1500 : -1500; }
    else if (tenpaiCount === 3) { for (let i = 0; i < 4; i++) G.players[i].score += tenpai[i] ? 1000 : -3000; }
  }

  const overlay = document.getElementById('agari-overlay');
  overlay.classList.remove('hidden', 'tier-normal', 'tier-mangan', 'tier-yakuman');
  setTimeout(() => overlay.classList.add('show'), 10);

  document.getElementById('agari-type').textContent = '流局';
  document.getElementById('agari-hand').innerHTML = '';

  const yakuEl = document.getElementById('yaku-list');
  yakuEl.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    let row = document.createElement('div');
    row.className = 'yaku-row';
    row.innerHTML = `<span class="yn">${G.players[i].name}</span><span class="yh">${tenpai[i] ? 'テンパイ' : 'ノーテン'}</span>`;
    yakuEl.appendChild(row);
  }

  G.agariData = {isRyuukyoku: true, tenpai};

  const btn = document.getElementById('agari-btn');
  btn.onclick = function() {
    overlay.classList.remove('show');
    setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('tier-normal', 'tier-mangan', 'tier-yakuman'); }, 500);

    let dealerTenpai = tenpai[G.dealer];
    if (dealerTenpai) { G.honba++; }
    else { G.honba++; G.roundNum++; G.dealer = (G.dealer + 1) % 4; }

    if (G.roundNum > G.totalRounds) { showFinalResult(); return; }

    setTimeout(() => { btn.onclick = nextAfterAgari; startRound(); }, 600);
  };
}

function showFinalResult() {
  G.gamePhase = 'end';
  stopTimer();
  const screen = document.getElementById('result-screen');
  screen.classList.remove('hidden');

  let sorted = G.players.slice().sort((a, b) => b.score - a.score);
  const scoresEl = document.getElementById('result-scores');
  scoresEl.innerHTML = '';
  sorted.forEach((p, i) => {
    let row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `<span class="rank">${i+1}</span><span class="name">${p.name}</span><span class="pts">${p.score.toLocaleString()}</span>`;
    scoresEl.appendChild(row);
  });

  // Determine player rank and score
  let playerRank = sorted.findIndex(p => p.name === 'あなた') + 1;
  let playerScore = G.players[0].score;
  lastResultData = {rank: playerRank, score: playerScore};
  recordResult(playerRank, playerScore);
  updateTitleStats();
}

async function continueAfterCallCheck(fromPlayer) {
  for (let i = 1; i < 4; i++) {
    if (i === fromPlayer) continue;
    if (aiShouldPon(i, G.lastDiscard)) {
      await delay(getAiDelay() * 0.75);
      executePon(i, G.lastDiscard, fromPlayer); renderAll();
      await delay(getAiDelay() * 0.75);
      G.currentPlayer = i;
      let discIdx = aiChooseDiscard(i);
      let discTile = G.players[i].hand.splice(discIdx, 1)[0];
      G.players[i].hand = sortHand(G.players[i].hand);
      G.players[i].discards.push(discTile);
      G.discardMeta[i].push({isTsumogiri: false});
      G.lastDiscard = discTile; G.lastDiscardPlayer = i;
      playDahaiSound(); renderAll();
      G.gamePhase = 'call'; gameLoop(); return;
    }
  }
  for (let i = 1; i < 4; i++) {
    let aiKamicha = (i + 4 - 1) % 4;
    if (fromPlayer === aiKamicha) {
      let chiResult = aiShouldChi(i, G.lastDiscard);
      if (chiResult) {
        await delay(getAiDelay() * 0.75);
        executeChi(i, chiResult, G.lastDiscard, fromPlayer); renderAll();
        await delay(getAiDelay() * 0.75);
        G.currentPlayer = i;
        let discIdx = aiChooseDiscard(i);
        let discTile = G.players[i].hand.splice(discIdx, 1)[0];
        G.players[i].hand = sortHand(G.players[i].hand);
        G.players[i].discards.push(discTile);
        G.discardMeta[i].push({isTsumogiri: false});
        G.lastDiscard = discTile; G.lastDiscardPlayer = i;
        playDahaiSound(); renderAll();
        G.gamePhase = 'call'; gameLoop(); return;
      }
    }
  }
  G.currentPlayer = (fromPlayer + 1) % 4;
  G.gamePhase = 'draw';
  gameLoop();
}

function declareRiichi() {
  let p = G.players[0];

  p.riichiTurn = G.turnCount;
  p.isIppatsu = true;
  p.score -= 1000;
  G.kyotaku++;
  showRiichiLine(0);
  playRiichiSound();
  renderAll();

  let validDiscards = [];
  for (let i = 0; i < p.hand.length; i++) {
    let testHand = p.hand.filter((_, j) => j !== i);
    if (calcShanten(testHand, 0) === 0) validDiscards.push(i);
  }
  const handArea = document.getElementById('hand-area');
  const tiles = handArea.querySelectorAll('.hand-tile');
  tiles.forEach((el, i) => { if (!validDiscards.includes(i)) el.classList.add('riichi-dim'); });

function playerDiscard(index) {
  if (!G.waitingForInput || G.currentPlayer !== 0 || G.gamePhase !== 'discard') return;
  let p = G.players[0];
  if (p.isRiichi) {
    let testHand = p.hand.filter((_, j) => j !== index);
    if (calcShanten(testHand, 0) !== 0) return;
  }
  let discTile = p.hand.splice(index, 1)[0];
  let isTsumogiri = G.tsumoTile && discTile.id === G.tsumoTile.id;
  p.hand = sortHand(p.hand);
  if (p.isRiichi && p.discards.filter(d => !d.called).length === p.riichiTurn - 1) discTile.riichiMark = true;
  p.discards.push(discTile);
  G.discardMeta[0].push({isTsumogiri});
  G.lastDiscard = discTile; G.lastDiscardPlayer = 0;
  G.waitingForInput = false; G.selectedTile = -1; stopTimer();
  playDahaiSound();
  document.getElementById('btn-area').innerHTML = '';
  renderAll();
  G.gamePhase = 'call'; gameLoop();
}

    div.setAttribute('aria-label', tileLabel(t));

function renderShantenDisplay() {
  const shantenEl = document.getElementById('shanten-display');
  const machiEl = document.getElementById('machi-display');
  if (!shantenEl || !machiEl) return;

  if (!Settings.shantenEnabled || G.gamePhase === 'idle' || G.gamePhase === 'end') {
    shantenEl.textContent = ''; machiEl.textContent = ''; return;
  }

  let p = G.players[0];
  let handForCalc = p.hand.slice();
  let sh;
  if (handForCalc.length === 14 - p.melds.length * 3) {
    let bestSh = 99;
    for (let i = 0; i < handForCalc.length; i++) {
      let test = handForCalc.filter((_, j) => j !== i);
      let s = calcShanten(test, p.melds.length);
      if (s < bestSh) bestSh = s;
    }
    sh = bestSh;
  } else {
    sh = calcShanten(handForCalc, p.melds.length);
  }

  shantenEl.classList.remove('tenpai', 'agari');

  if (sh < 0 || isComplete(handForCalc, p.melds.length)) {
    shantenEl.textContent = '和了'; shantenEl.classList.add('agari'); machiEl.textContent = '';
  } else if (sh === 0) {
    shantenEl.textContent = 'テンパイ'; shantenEl.classList.add('tenpai');
    let waits;
    if (handForCalc.length === 14 - p.melds.length * 3) {
      let bestWaits = [];
      for (let i = 0; i < handForCalc.length; i++) {
        let test = handForCalc.filter((_, j) => j !== i);
        if (calcShanten(test, p.melds.length) === 0) {
          let w = getWaitingTiles(test, p.melds.length);
          if (w.length > bestWaits.length) bestWaits = w;
        }
      }
      waits = bestWaits;
    } else {
      waits = getWaitingTiles(handForCalc, p.melds.length);
    }
    machiEl.textContent = waits.length > 0 ? '待ち: ' + waits.map(w => tileDisplay(w)).join('') : '';
  } else {
    shantenEl.textContent = sh + '向聴'; machiEl.textContent = '';
  }
}

function getRelativePlayer(offset) { return (0 + offset) % 4; }

function renderOpponent() {
  let oppIdx = getRelativePlayer(2);
  let p = G.players[oppIdx];
  document.getElementById('opp-name').textContent = p.name;
  document.getElementById('opp-wind').textContent = WIND_NAMES[p.seatWind];
  document.getElementById('opp-score').textContent = p.score.toLocaleString();
  let tilesEl = document.getElementById('opp-tiles');
  tilesEl.innerHTML = '';
  for (let i = 0; i < p.hand.length; i++) {
    let div = document.createElement('div'); div.className = 'opp-tile-back'; tilesEl.appendChild(div);
  }
  if (p.isRiichi) document.getElementById('opp-riichi').classList.remove('hidden');
  else document.getElementById('opp-riichi').classList.add('hidden');
}

function renderSidePanels() {
  renderSidePanel('left', getRelativePlayer(3));
  renderSidePanel('right', getRelativePlayer(1));
}

function renderSidePanel(side, pidx) {
  let p = G.players[pidx];
  document.getElementById(side + '-name').textContent = p.name;
  document.getElementById(side + '-wind').textContent = WIND_NAMES[p.seatWind];
  document.getElementById(side + '-score').textContent = p.score.toLocaleString();
  let tilesEl = document.getElementById(side + '-tiles');
  tilesEl.innerHTML = '';
  for (let i = 0; i < p.hand.length; i++) {
    let div = document.createElement('div'); div.className = 'side-tile-back'; tilesEl.appendChild(div);
  }
  if (p.isRiichi) document.getElementById(side + '-riichi').classList.remove('hidden');
  else document.getElementById(side + '-riichi').classList.add('hidden');
}

function renderDiscards() {
  const areas = [
    {id: 'discard-self', pidx: 0},
    {id: 'discard-opp', pidx: getRelativePlayer(2)},
    {id: 'discard-left', pidx: getRelativePlayer(3)},
    {id: 'discard-right', pidx: getRelativePlayer(1)}
  ];
  for (const area of areas) {
    let el = document.getElementById(area.id);
    el.innerHTML = '';
    let p = G.players[area.pidx];
    for (let i = 0; i < p.discards.length; i++) {
      let t = p.discards[i];
      let div = document.createElement('div');
      div.className = 'disc-tile normal';
      if (t.red) div.classList.add('red-tile');
      if (t.called) div.classList.add('called');
      if (t.riichiMark) div.classList.add('riichi-mark');
      let meta = G.discardMeta[area.pidx][i];
      if (meta && meta.isTsumogiri && !t.called) div.classList.add('tsumogiri');
      if (i === p.discards.length - 1 && area.pidx === G.lastDiscardPlayer) {
        div.classList.add('latest');
        if (Settings.effectsEnabled) div.classList.add('dealing');
      }
      div.textContent = tileDisplay(t);
      div.style.color = tileColor(t);
      div.setAttribute('aria-label', tileLabel(t));
      el.appendChild(div);
    }
  }
}

function renderHand() {
  const handArea = document.getElementById('hand-area');
  handArea.innerHTML = '';
  let p = G.players[0];

  for (const m of p.melds) {
    let meldDiv = document.createElement('div');
    meldDiv.className = 'hand-meld';
    if (m.type === 'ankan') {
      for (let ti = 0; ti < m.tiles.length; ti++) {
        let div = document.createElement('div');
        div.className = 'meld-tile';
        if (ti === 0 || ti === 3) div.classList.add('kan-back');
        else { div.textContent = tileDisplay(m.tiles[ti]); div.style.color = tileColor(m.tiles[ti]); }
        div.setAttribute('aria-label', tileLabel(m.tiles[ti]));
        meldDiv.appendChild(div);
      }
    } else {
      for (const t of m.tiles) {
        let div = document.createElement('div');
        div.className = 'meld-tile';
        div.textContent = tileDisplay(t); div.style.color = tileColor(t);
        div.setAttribute('aria-label', tileLabel(t));
        meldDiv.appendChild(div);
      }
    }
    handArea.appendChild(meldDiv);
  }

  let hand = p.hand.slice();
  let hasTsumo = G.currentPlayer === 0 && G.gamePhase === 'discard' && hand.length === 14 - p.melds.length * 3;
  if (hasTsumo) { let tsumo = hand.pop(); hand = sortHand(hand); hand.push(tsumo); }
  else { hand = sortHand(hand); }

  for (let i = 0; i < hand.length; i++) {
    let t = hand[i];
    let div = createTileElement(t, true, true);
    if (hasTsumo && i === hand.length - 1) div.classList.add('tsumo-tile');
    if (G.selectedTile === i) div.classList.add('selected');

    const idx = i;
    div.addEventListener('click', (e) => {
      e.preventDefault();
      if (!G.waitingForInput || G.currentPlayer !== 0 || G.gamePhase !== 'discard') return;
      if (G.selectedTile === idx) {
        let actualIdx;
        if (hasTsumo) {
          if (idx === hand.length - 1) actualIdx = p.hand.length - 1;
          else actualIdx = p.hand.findIndex(ht => ht.id === hand[idx].id);
        } else actualIdx = p.hand.findIndex(ht => ht.id === hand[idx].id);
        if (actualIdx >= 0) playerDiscard(actualIdx);
      } else { G.selectedTile = idx; renderHand(); }
    });

    div.draggable = true;
    div.addEventListener('dragstart', (e) => {
      if (!G.waitingForInput || G.currentPlayer !== 0 || G.gamePhase !== 'discard') { e.preventDefault(); return; }
      e.dataTransfer.setData('text/plain', idx.toString());
      e.dataTransfer.effectAllowed = 'move';
      div.classList.add('dragging');
      const ghost = document.getElementById('drag-ghost');
      ghost.className = 'hand-tile';
      ghost.style.cssText = 'width:42px;height:58px;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;position:fixed;top:-100px;left:-100px;z-index:200';
      ghost.style.backgroundColor = t.red ? '#F5EDE0' : '#F0EBDB';
      ghost.textContent = tileDisplay(t);
      ghost.style.color = tileColor(t);
      ghost.classList.remove('hidden');
      e.dataTransfer.setDragImage(ghost, 21, 29);
    });
    div.addEventListener('dragend', () => { div.classList.remove('dragging'); document.getElementById('drag-ghost').classList.add('hidden'); });

    handArea.appendChild(div);
  }

  const discardSelf = document.getElementById('discard-self');
  const tableArea = document.getElementById('table-area');
  function handleDrop(e) {
    e.preventDefault();
    const dragIdx = parseInt(e.dataTransfer.getData('text/plain'));
    if (isNaN(dragIdx) || !G.waitingForInput || G.currentPlayer !== 0 || G.gamePhase !== 'discard') return;
    let actualIdx;
    if (hasTsumo) {
      if (dragIdx === hand.length - 1) actualIdx = p.hand.length - 1;
      else actualIdx = p.hand.findIndex(ht => ht.id === hand[dragIdx].id);
    } else actualIdx = p.hand.findIndex(ht => ht.id === hand[dragIdx].id);
    if (actualIdx >= 0) playerDiscard(actualIdx);
  }
  function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
  tableArea.addEventListener('dragover', handleDragOver);
  tableArea.addEventListener('drop', handleDrop);
  discardSelf.addEventListener('dragover', handleDragOver);
  discardSelf.addEventListener('drop', handleDrop);
}

function showRiichiLine(playerIdx) {
  let lineId;
  if (playerIdx === 0) lineId = 'riichi-line-self';
  else if (playerIdx === getRelativePlayer(2)) lineId = 'riichi-line-opp';
  else if (playerIdx === getRelativePlayer(3)) lineId = 'riichi-line-left';
  else lineId = 'riichi-line-right';
  document.getElementById(lineId).classList.add('active');
}

function showRiichiMark(playerIdx) {
  if (playerIdx === getRelativePlayer(2)) document.getElementById('opp-riichi').classList.remove('hidden');
  else if (playerIdx === getRelativePlayer(3)) document.getElementById('left-riichi').classList.remove('hidden');
  else if (playerIdx === getRelativePlayer(1)) document.getElementById('right-riichi').classList.remove('hidden');
}

function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

// ===== GAME START =====
function startGame() {
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  updateSoundIcon();
  initGame();
  startRound();
  showTutorial();
}

function restartGame() {
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('agari-overlay').classList.add('hidden');
  document.getElementById('agari-overlay').classList.remove('show', 'tier-normal', 'tier-mangan', 'tier-yakuman');
  stopGoldParticles();
  initGame();
  startRound();
}

// Init title stats on load
updateTitleStats();

// Register service worker for PWA if available
if ('serviceWorker' in navigator) {
  // No external SW file needed for basic PWA - manifest handles Add to Home Screen
}
</script>
